<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--surface3:#22222e;
  --border:rgba(255,255,255,0.07);--accent:#7fffb2;--accent2:#4fc3f7;
  --danger:#ff5252;--text:#f0f0f8;--muted:rgba(240,240,248,0.4);--muted2:rgba(240,240,248,0.2);
}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(127,255,178,0.03) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(79,195,247,0.03) 0%,transparent 60%);pointer-events:none}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
.login-box{width:100%;max-width:380px;padding:24px}
.login-logo{text-align:center;margin-bottom:40px}
.login-logo h1{font-size:52px;font-weight:800;letter-spacing:-3px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-logo p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-top:6px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(127,255,178,0.4),transparent)}
.login-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px 18px;color:var(--text);font-family:'Syne',sans-serif;font-size:16px;font-weight:600;outline:none;transition:border-color 0.2s;margin-bottom:16px}
.login-input:focus{border-color:rgba(127,255,178,0.5)}
.login-input::placeholder{color:var(--muted);font-weight:400;font-size:14px}
.avatars{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.av-btn{width:44px;height:44px;border-radius:12px;background:var(--surface2);border:2px solid transparent;font-size:22px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
.av-btn:hover{background:var(--surface3);transform:scale(1.1)}
.av-btn.selected{border-color:var(--accent);background:rgba(127,255,178,0.1)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,rgba(127,255,178,0.25),rgba(79,195,247,0.25));border:1px solid rgba(127,255,178,0.4);border-radius:14px;color:var(--accent);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.login-btn:hover{background:linear-gradient(135deg,rgba(127,255,178,0.35),rgba(79,195,247,0.35));transform:translateY(-1px)}
.login-hint{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:14px}
.login-hint span{color:var(--accent2)}

/* ── APP LAYOUT ── */
#app{display:none;width:100%;height:100vh;flex-direction:row}
#app.active{display:flex}

/* sidebar */
.sidebar{width:300px;min-width:300px;height:100%;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative}
.sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.my-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer;overflow:hidden;position:relative}
.my-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.my-avatar:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:50%}
.my-name{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;cursor:pointer;transition:color 0.15s}
.my-id:hover{color:var(--accent)}
.sidebar-actions{display:flex;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.icon-btn:hover{background:var(--surface2);color:var(--text)}

.search-bar{padding:12px 14px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:9px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:rgba(127,255,178,0.3)}
.search-input::placeholder{color:var(--muted);font-size:12px}

.contacts-list{flex:1;overflow-y:auto;padding:8px 0}
.contacts-list::-webkit-scrollbar{width:4px}
.contacts-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.contact-item{padding:10px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s;position:relative}
.contact-item:hover{background:var(--surface2)}
.contact-item.active{background:rgba(127,255,178,0.07);border-right:2px solid var(--accent)}
.contact-avatar{width:42px;height:42px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#666;border:2px solid var(--surface)}
.online-dot.online{background:var(--accent)}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.contact-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-family:'DM Mono',monospace}
.contact-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.contact-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.unread-badge{background:var(--accent);color:#000;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}

.no-contacts{padding:40px 20px;text-align:center;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;line-height:2}

.add-contact-btn{margin:12px 14px;padding:11px;background:rgba(127,255,178,0.08);border:1px dashed rgba(127,255,178,0.2);border-radius:14px;color:var(--accent);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center}
.add-contact-btn:hover{background:rgba(127,255,178,0.14)}

/* ── CHAT AREA ── */
.chat-area{flex:1;height:100%;display:flex;flex-direction:column;position:relative}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted)}
.empty-state .big{font-size:48px}
.empty-state p{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px}

.chat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--surface)}
.chat-header .contact-avatar{width:38px;height:38px;font-size:18px}
.chat-header-info{flex:1}
.chat-header-name{font-size:15px;font-weight:700}
.chat-header-status{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px}
.chat-call-btns{display:flex;gap:8px}
.call-icon-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.call-voice-btn{background:var(--surface2);color:var(--text)}
.call-voice-btn:hover{background:var(--surface3)}
.call-video-btn{background:rgba(127,255,178,0.15);color:var(--accent)}
.call-video-btn:hover{background:rgba(127,255,178,0.25)}

.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg-group{display:flex;flex-direction:column;gap:2px;margin-bottom:8px}
.msg-group.mine{align-items:flex-end}
.msg-group.theirs{align-items:flex-start}
.msg-sender{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-bottom:4px;padding:0 4px}

.msg-bubble{max-width:65%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;position:relative;animation:msgIn 0.2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.mine .msg-bubble{background:rgba(127,255,178,0.15);border:1px solid rgba(127,255,178,0.2);border-bottom-right-radius:4px}
.theirs .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px;display:flex;align-items:center;gap:4px}
.msg-check{font-size:12px;color:var(--muted)}
.msg-check.read{color:var(--accent)}
.date-divider{text-align:center;margin:16px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.typing-indicator{display:none;padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);animation:pulse 1.5s infinite}
.typing-indicator.show{display:block}

.chat-input-area{padding:14px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:10px;align-items:flex-end}
.msg-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:11px 16px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5;transition:border-color 0.2s}
.msg-input:focus{border-color:rgba(127,255,178,0.4)}
.msg-input::placeholder{color:var(--muted)}
.send-btn{width:42px;height:42px;border-radius:14px;border:none;cursor:pointer;background:var(--accent);color:#000;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.05)}
.send-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}

/* ── ADD CONTACT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:340px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(127,255,178,0.3),transparent);border-radius:20px 20px 0 0}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;letter-spacing:1px;outline:none;transition:border-color 0.2s;margin-bottom:12px}
.modal-input:focus{border-color:rgba(127,255,178,0.4)}
.modal-input::placeholder{color:var(--muted);letter-spacing:0;font-size:13px}
.modal-user-preview{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:none;align-items:center;gap:10px}
.modal-user-preview.show{display:flex}
.modal-btns{display:flex;gap:10px}
.modal-btn{flex:1;padding:11px;border-radius:12px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;transition:all 0.2s}
.modal-btn.primary{background:var(--accent);color:#000}
.modal-btn.primary:hover{transform:translateY(-1px)}
.modal-btn.secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.modal-btn.secondary:hover{background:var(--surface3)}
.modal-error{font-family:'DM Mono',monospace;font-size:11px;color:var(--danger);margin-bottom:10px;display:none}
.modal-error.show{display:block}

/* ── CALL SCREEN ── */
#call-screen{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);flex-direction:column;align-items:center;justify-content:center}
#call-screen.active{display:flex}
.video-wrap{position:relative;width:100%;height:100%}
#remote-video{width:100%;height:100%;object-fit:cover;background:#050508}
#local-video{position:absolute;bottom:110px;right:20px;width:130px;height:174px;object-fit:cover;border-radius:14px;border:2px solid rgba(255,255,255,0.2);box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.voice-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:40px}
.call-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
.call-avatar::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(127,255,178,0.25);animation:ripple 2s ease-out infinite}
@keyframes ripple{0%{transform:scale(0.9);opacity:1}100%{transform:scale(1.4);opacity:0}}
.call-name{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.call-status{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}
.wave{display:flex;align-items:center;gap:3px;height:28px}
.wb{width:3px;border-radius:2px;background:var(--accent);animation:wa 1.2s ease-in-out infinite}
.wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.1s}.wb:nth-child(3){animation-delay:.2s}.wb:nth-child(4){animation-delay:.3s}.wb:nth-child(5){animation-delay:.2s}.wb:nth-child(6){animation-delay:.1s}.wb:nth-child(7){animation-delay:0s}
@keyframes wa{0%,100%{height:4px;opacity:.4}50%{height:22px;opacity:1}}
.call-controls{position:absolute;bottom:0;left:0;right:0;padding:20px 32px 36px;display:flex;justify-content:center;gap:16px;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent)}
.ctrl{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s;background:rgba(255,255,255,0.1);color:#fff;backdrop-filter:blur(10px)}
.ctrl:hover{transform:scale(1.08);background:rgba(255,255,255,0.15)}
.ctrl.on{background:rgba(127,255,178,0.2);color:var(--accent)}
.ctrl.end-call{background:var(--danger);width:64px;height:64px;font-size:22px}
.ctrl.end-call:hover{background:#ff3333}

/* ── INCOMING CALL ── */
#incoming-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(24px);z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#incoming-overlay.active{display:flex}
.inc-label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--muted)}
.inc-name{font-size:30px;font-weight:800;color:var(--accent)}
.inc-type{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}
.inc-btns{display:flex;gap:28px;margin-top:10px}
.inc-btn{width:74px;height:74px;border-radius:50%;border:none;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative}
.inc-btn::after{content:'';position:absolute;inset:-7px;border-radius:50%;animation:ripple 1.4s ease-out infinite}
.inc-accept{background:#1db954;color:#fff}
.inc-accept::after{border:2px solid #1db954}
.inc-decline{background:var(--danger);color:#fff}
.inc-decline::after{border:2px solid var(--danger);animation-delay:.15s}
.inc-btn:hover{transform:scale(1.08)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-family:'DM Mono',monospace;font-size:12px;z-index:600;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .sidebar{width:100%;position:absolute;z-index:10;transform:translateX(0);transition:transform 0.3s}
  .sidebar.hidden{transform:translateX(-100%)}
  .chat-area{width:100%}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo"><h1>WAVE</h1><p>мессенджер</p></div>
    <div class="login-card">
      <label class="login-label">твоё имя</label>
      <input class="login-input" id="login-name" type="text" placeholder="например: Александр" maxlength="20" />
      <label class="login-label">аватар</label>
      <div class="avatars" id="avatar-picker">
        <button class="av-btn selected" data-av="👤">👤</button>
        <button class="av-btn" data-av="🦊">🦊</button>
        <button class="av-btn" data-av="🐺">🐺</button>
        <button class="av-btn" data-av="🦁">🦁</button>
        <button class="av-btn" data-av="🐯">🐯</button>
        <button class="av-btn" data-av="🐻">🐻</button>
        <button class="av-btn" data-av="🦝">🦝</button>
        <button class="av-btn" data-av="🐸">🐸</button>
        <button class="av-btn" data-av="👽">👽</button>
        <button class="av-btn" data-av="🤖">🤖</button>
      </div>
      <button class="login-btn" onclick="login()">Войти →</button>
      <div class="login-hint">Имя — твой логин. Одно имя = один аккаунт.<br><span>Твой ID появится после входа</span></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar" id="my-avatar-el" onclick="triggerAvatarUpload()" title="Сменить аватар">👤</div>
      <input type="file" id="avatar-upload" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)" />
      <div style="flex:1;min-width:0">
        <div class="my-name" id="my-name-el">—</div>
        <div class="my-id" id="my-id-el" onclick="copyMyId()" title="Нажми чтобы скопировать">ID: ——</div>
      </div>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="showAddContact()" title="Добавить контакт">＋</button>
      </div>
    </div>
    <div class="search-bar">
      <input class="search-input" id="search-input" type="text" placeholder="Поиск контактов..." oninput="filterContacts(this.value)" />
    </div>
    <div class="contacts-list" id="contacts-list">
      <div class="no-contacts">Контактов пока нет.<br>Нажми ＋ чтобы добавить.</div>
    </div>
    <button class="add-contact-btn" onclick="showAddContact()">＋ Добавить контакт</button>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="big">💬</div>
      <p>выбери контакт</p>
    </div>

    <div id="active-chat" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <div class="contact-avatar" id="chat-avatar">👤</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-name">—</div>
          <div class="chat-header-status" id="chat-status">офлайн</div>
        </div>
        <div class="chat-call-btns">
          <button class="call-icon-btn call-voice-btn" onclick="callContact(false)" title="Голосовой звонок">🎙️</button>
          <button class="call-icon-btn call-video-btn" onclick="callContact(true)" title="Видеозвонок">📹</button>
        </div>
      </div>
      <div class="messages-area" id="messages-area">
        <div class="typing-indicator" id="typing-indicator">печатает...</div>
      </div>
      <div class="chat-input-area">
        <textarea class="msg-input" id="msg-input" placeholder="Сообщение..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- Add contact modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">Добавить контакт</div>
    <input class="modal-input" id="add-id-input" type="text" placeholder="Введи ID пользователя" maxlength="8" oninput="lookupUser(this.value)" />
    <div class="modal-user-preview" id="user-preview">
      <span id="preview-avatar" style="font-size:24px">👤</span>
      <div>
        <div id="preview-name" style="font-weight:600;font-size:14px">—</div>
        <div id="preview-id" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">—</div>
      </div>
    </div>
    <div class="modal-error" id="modal-error">Пользователь не найден</div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="hideAddContact()">Отмена</button>
      <button class="modal-btn primary" id="add-confirm-btn" onclick="confirmAddContact()" disabled>Добавить</button>
    </div>
  </div>
</div>

<!-- Call screen -->
<div id="call-screen">
  <div id="video-wrap" style="width:100%;height:100%;position:relative;display:none">
    <div class="video-wrap">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video" autoplay playsinline muted></video>
    </div>
  </div>
  <div class="voice-screen" id="voice-screen" style="display:none">
    <div class="call-avatar" id="call-avatar-el">👤</div>
    <div class="call-name" id="call-name-el">—</div>
    <div class="call-status" id="call-status-el">звоним...</div>
    <div class="wave"><div class="wb" style="height:6px"></div><div class="wb" style="height:14px"></div><div class="wb" style="height:20px"></div><div class="wb" style="height:24px"></div><div class="wb" style="height:20px"></div><div class="wb" style="height:14px"></div><div class="wb" style="height:6px"></div></div>
  </div>
  <div class="call-controls">
    <button class="ctrl" id="mute-btn" onclick="toggleMute()">🎙️</button>
    <button class="ctrl" id="cam-btn" onclick="toggleCam()" style="display:none">📹</button>
    <button class="ctrl end-call" onclick="endCall()">📵</button>
  </div>
</div>

<!-- Incoming call -->
<div id="incoming-overlay">
  <div class="inc-label">входящий звонок</div>
  <div class="call-avatar" id="inc-avatar">👤</div>
  <div class="inc-name" id="inc-name">—</div>
  <div class="inc-type" id="inc-type">голосовой</div>
  <div class="inc-btns">
    <button class="inc-btn inc-decline" onclick="declineCall()">📵</button>
    <button class="inc-btn inc-accept" onclick="acceptCall()">📞</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── Load PeerJS ───────────────────────────────────────────────────────────────
(function(){
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js';
  document.head.appendChild(s);
})();

// ── State ─────────────────────────────────────────────────────────────────────
let me = null; // { id, name, avatar }
let socket = null;
let peer = null;
let contacts = []; // loaded from server
let currentChat = null; // { id, name, avatar }
let localStream = null, currentCall = null, dataConn = null;
let isVideo = false, isMuted = false, isCamOff = false;
let incomingData = null;
let typingTimer = null;
let ringtoneCtx = null, ringtoneInt = null;
let foundUser = null;

// ── Avatar picker ─────────────────────────────────────────────────────────────
let selectedAvatar = '👤';
document.getElementById('avatar-picker').addEventListener('click', e => {
  const btn = e.target.closest('.av-btn');
  if (!btn) return;
  document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedAvatar = btn.dataset.av;
});

// ── Login ─────────────────────────────────────────────────────────────────────
async function login() {
  const name = document.getElementById('login-name').value.trim();
  if (!name || name.length < 2) { toast('Введи имя (минимум 2 символа)'); return; }

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, avatar: selectedAvatar })
    });
    const user = await res.json();
    if (!res.ok) { toast(user.error || 'Ошибка'); return; }

    me = user;
    try { localStorage.setItem('wave_user', JSON.stringify(me)); } catch(e){}
    startApp();
  } catch(e) { toast('Ошибка соединения с сервером'); }
}

async function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('my-avatar-el').textContent = me.avatar;
  document.getElementById('my-name-el').textContent = me.name;
  document.getElementById('my-id-el').textContent = 'ID: ' + me.id;

  // Load custom avatar if saved
  try {
    const savedImg = localStorage.getItem('wave_avatar_img');
    if (savedImg) setAvatarImg(savedImg);
  } catch(e) {}

  connectSocket();
  initPeer();
  await loadContacts();
}

// ── Socket ────────────────────────────────────────────────────────────────────
function connectSocket() {
  socket = io();
  socket.emit('join', { userId: me.id });

  socket.on('message', async (msg) => {
    if (currentChat && (msg.from_id === currentChat.id || msg.to_id === currentChat.id)) {
      appendMessage(msg);
      socket.emit('read', { fromId: msg.from_id });
    }

    if (msg.from_id !== me.id) {
      let c = contacts.find(c => c.id === msg.from_id);

      // Unknown sender — fetch and add to sidebar in real time
      if (!c) {
        try {
          const res = await fetch('/api/user/' + msg.from_id);
          if (res.ok) {
            const user = await res.json();
            c = { ...user, online: true, unread: 0, _preview: '', _time: '' };
            contacts.unshift(c);
          }
        } catch(e) {}
      }

      if (c) {
        updateContactPreview(msg);
        if (!currentChat || currentChat.id !== msg.from_id) {
          showBrowserNotif(c.name, msg.text);
          c.unread = (c.unread || 0) + 1;
          renderContacts();
        }
      }
    } else {
      updateContactPreview(msg);
    }
  });

  socket.on('presence', ({ userId, online }) => {
    const c = contacts.find(c => c.id === userId);
    if (c) {
      c.online = online;
      renderContacts();
      if (currentChat && currentChat.id === userId) {
        updateChatStatus(online);
      }
    }
  });

  socket.on('typing', ({ fromId, typing }) => {
    if (currentChat && fromId === currentChat.id) {
      const el = document.getElementById('typing-indicator');
      el.classList.toggle('show', typing);
    }
  });

  socket.on('read', ({ byId }) => {
    if (currentChat && byId === currentChat.id) {
      document.querySelectorAll('.msg-check').forEach(el => el.classList.add('read'));
    }
  });

  socket.on('call-invite', ({ from, callType, peerId }) => {
    incomingData = { from, callType, peerId };
    document.getElementById('inc-avatar').textContent = from.avatar || '👤';
    document.getElementById('inc-name').textContent = from.name;
    document.getElementById('inc-type').textContent = callType === 'video' ? '📹 видеозвонок' : '🎙️ голосовой звонок';
    document.getElementById('incoming-overlay').classList.add('active');
    playRingtone();
  });

  socket.on('call-accept', ({ peerId }) => {
    connectMediaCall(peerId, isVideo);
  });

  socket.on('call-decline', () => {
    toast('Звонок отклонён');
    cleanupCall();
  });

  socket.on('call-end', () => {
    cleanupCall();
  });
}

// ── Peer ──────────────────────────────────────────────────────────────────────
function initPeer() {
  const h = window.location.hostname;
  const p = window.location.port ? parseInt(window.location.port) : (location.protocol === 'https:' ? 443 : 80);
  peer = new Peer(me.id + '_' + Date.now(), {
    host: h, port: p, path: '/peerjs', secure: location.protocol === 'https:',
    config: { iceServers: [
      { urls: 'stun:stun.cloudflare.com:3478' },
      { urls: 'stun:stun.yandex.net:3478' },
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ]}
  });
  peer.on('error', e => console.warn('peer error', e.type));
}

// ── Contacts ──────────────────────────────────────────────────────────────────
async function loadContacts() {
  try {
    const res = await fetch('/api/contacts/' + me.id);
    contacts = await res.json();
    renderContacts();
  } catch(e) {}
}

function renderContacts(filter = '') {
  const list = document.getElementById('contacts-list');
  const filtered = filter
    ? contacts.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()) || c.id.toLowerCase().includes(filter.toLowerCase()))
    : contacts;

  if (!filtered.length) {
    list.innerHTML = '<div class="no-contacts">' + (filter ? 'Не найдено' : 'Контактов пока нет.<br>Нажми ＋ чтобы добавить.') + '</div>';
    return;
  }

  list.innerHTML = filtered.map(c => `
    <div class="contact-item ${currentChat && currentChat.id === c.id ? 'active' : ''}" onclick="openChat('${c.id}')">
      <div class="contact-avatar">
        ${c.avatar || '👤'}
        <div class="online-dot ${c.online ? 'online' : ''}"></div>
      </div>
      <div class="contact-info">
        <div class="contact-name">${c.nickname || c.name}</div>
        <div class="contact-preview">${c._preview || c.id}</div>
      </div>
      <div class="contact-meta">
        ${c._time ? `<div class="contact-time">${c._time}</div>` : ''}
        ${c.unread ? `<div class="unread-badge">${c.unread}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function filterContacts(val) { renderContacts(val); }

function updateContactPreview(msg) {
  const peerId = msg.from_id === me.id ? msg.to_id : msg.from_id;
  const c = contacts.find(c => c.id === peerId);
  if (c) {
    c._preview = (msg.from_id === me.id ? 'ты: ' : '') + msg.text;
    const d = new Date(msg.created_at * 1000);
    c._time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    renderContacts();
  }
}

// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(contactId) {
  const contact = contacts.find(c => c.id === contactId);
  if (!contact) return;
  currentChat = contact;

  // Reset unread
  contact.unread = 0;
  renderContacts();

  document.getElementById('empty-state').style.display = 'none';
  const activeChat = document.getElementById('active-chat');
  activeChat.style.display = 'flex';

  document.getElementById('chat-avatar').textContent = contact.avatar || '👤';
  document.getElementById('chat-name').textContent = contact.nickname || contact.name;
  updateChatStatus(contact.online);

  // Load messages
  const res = await fetch(`/api/messages/${me.id}/${contactId}`);
  const msgs = await res.json();
  const area = document.getElementById('messages-area');
  area.innerHTML = '<div class="typing-indicator" id="typing-indicator">печатает...</div>';

  let lastDate = null;
  msgs.forEach(msg => {
    const d = new Date(msg.created_at * 1000);
    const dateStr = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = dateStr;
      area.appendChild(div);
    }
    appendMessage(msg, false);
  });

  area.scrollTop = area.scrollHeight;
  socket.emit('read', { fromId: contactId });
  document.getElementById('msg-input').focus();
}

function updateChatStatus(online) {
  document.getElementById('chat-status').textContent = online ? '🟢 онлайн' : 'офлайн';
}

// ── Messages ──────────────────────────────────────────────────────────────────
function appendMessage(msg, scroll = true) {
  const area = document.getElementById('messages-area');
  const mine = msg.from_id === me.id;
  const d = new Date(msg.created_at * 1000);
  const time = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');

  const div = document.createElement('div');
  div.className = 'msg-group ' + (mine ? 'mine' : 'theirs');
  div.dataset.msgId = msg.id;
  div.innerHTML = `
    <div class="msg-bubble">${msg.text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
    <div class="msg-time">
      ${time}
      ${mine ? `<span class="msg-check ${msg.read ? 'read' : ''}">✓✓</span>` : ''}
    </div>`;

  const typing = document.getElementById('typing-indicator');
  area.insertBefore(div, typing);
  if (scroll) area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentChat) return;

  socket.emit('message', { toId: currentChat.id, text });
  input.value = '';
  input.style.height = 'auto';
  socket.emit('typing', { toId: currentChat.id, typing: false });
}

// ── Add contact ───────────────────────────────────────────────────────────────
let lookupTimer = null;
function showAddContact() { document.getElementById('add-modal').classList.add('active'); document.getElementById('add-id-input').focus(); }
function hideAddContact() {
  document.getElementById('add-modal').classList.remove('active');
  document.getElementById('add-id-input').value = '';
  document.getElementById('user-preview').classList.remove('show');
  document.getElementById('modal-error').classList.remove('show');
  document.getElementById('add-confirm-btn').disabled = true;
  foundUser = null;
}

function lookupUser(val) {
  clearTimeout(lookupTimer);
  const id = val.trim().toUpperCase();
  if (id.length < 4) {
    document.getElementById('user-preview').classList.remove('show');
    document.getElementById('modal-error').classList.remove('show');
    document.getElementById('add-confirm-btn').disabled = true;
    return;
  }
  lookupTimer = setTimeout(async () => {
    try {
      const res = await fetch('/api/user/' + id);
      if (!res.ok) throw new Error();
      const user = await res.json();
      if (user.id === me.id) { showModalError('Это ты сам 😄'); return; }
      foundUser = user;
      document.getElementById('preview-avatar').textContent = user.avatar || '👤';
      document.getElementById('preview-name').textContent = user.name;
      document.getElementById('preview-id').textContent = user.id;
      document.getElementById('user-preview').classList.add('show');
      document.getElementById('modal-error').classList.remove('show');
      document.getElementById('add-confirm-btn').disabled = false;
    } catch(e) { showModalError('Пользователь не найден'); foundUser = null; }
  }, 400);
}

function showModalError(msg) {
  document.getElementById('modal-error').textContent = msg;
  document.getElementById('modal-error').classList.add('show');
  document.getElementById('user-preview').classList.remove('show');
  document.getElementById('add-confirm-btn').disabled = true;
}

async function confirmAddContact() {
  if (!foundUser) return;
  try {
    const res = await fetch('/api/contacts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ownerId: me.id, contactId: foundUser.id })
    });
    const contact = await res.json();
    if (!res.ok) { toast(contact.error || 'Ошибка'); return; }
    contacts.unshift(contact);
    renderContacts();
    hideAddContact();
    toast('✓ ' + contact.name + ' добавлен');
    openChat(contact.id);
  } catch(e) { toast('Ошибка'); }
}

// ── Calls ─────────────────────────────────────────────────────────────────────
async function callContact(video) {
  if (!currentChat) return;
  isVideo = video;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video ? { width:1280, height:720 } : false });
  } catch(e) { toast('Нет доступа к ' + (video ? 'камере/микрофону' : 'микрофону')); return; }

  showCallScreen(currentChat, video, true);
  socket.emit('call-invite', { toId: currentChat.id, callType: video ? 'video' : 'voice', peerId: peer.id });
}

function connectMediaCall(remotePeerId, video) {
  const call = peer.call(remotePeerId, localStream);
  currentCall = call;
  document.getElementById('call-status-el').textContent = 'соединяемся...';
  call.on('stream', remote => showRemoteStream(remote, video));
  call.on('close', () => cleanupCall());
}

async function acceptCall() {
  stopRingtone();
  document.getElementById('incoming-overlay').classList.remove('active');
  if (!incomingData) return;
  isVideo = incomingData.callType === 'video';

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo ? { width:1280, height:720 } : false });
  } catch(e) { toast('Нет доступа к микрофону/камере'); return; }

  const caller = contacts.find(c => c.id === incomingData.from.id) || incomingData.from;
  showCallScreen(caller, isVideo, false);
  socket.emit('call-accept', { toId: incomingData.from.id, peerId: peer.id });

  // Wait for incoming peer call
  peer.on('call', (call) => {
    call.answer(localStream);
    currentCall = call;
    document.getElementById('call-status-el').textContent = 'соединяемся...';
    call.on('stream', remote => showRemoteStream(remote, isVideo));
    call.on('close', () => cleanupCall());
  });
}

function declineCall() {
  stopRingtone();
  document.getElementById('incoming-overlay').classList.remove('active');
  if (incomingData) socket.emit('call-decline', { toId: incomingData.from.id });
  incomingData = null;
}

function showCallScreen(contact, video, outgoing) {
  document.getElementById('call-screen').classList.add('active');
  document.getElementById('call-avatar-el').textContent = contact.avatar || '👤';
  document.getElementById('call-name-el').textContent = contact.name || contact.id;
  document.getElementById('call-status-el').textContent = outgoing ? 'звоним...' : 'входящий...';

  if (video) {
    document.getElementById('video-wrap').style.display = 'block';
    document.getElementById('voice-screen').style.display = 'none';
    document.getElementById('cam-btn').style.display = 'flex';
    document.getElementById('local-video').srcObject = localStream;
  } else {
    document.getElementById('video-wrap').style.display = 'none';
    document.getElementById('voice-screen').style.display = 'flex';
    document.getElementById('cam-btn').style.display = 'none';
  }
}

function showRemoteStream(stream, video) {
  document.getElementById('call-status-el').textContent = '00:00';
  startCallTimer();
  if (video) {
    document.getElementById('remote-video').srcObject = stream;
  } else {
    const a = new Audio(); a.srcObject = stream; a.play();
  }
}

let callTimerInterval = null, callSecs = 0;
function startCallTimer() {
  callSecs = 0;
  callTimerInterval = setInterval(() => {
    callSecs++;
    const m = String(Math.floor(callSecs/60)).padStart(2,'0');
    const s = String(callSecs%60).padStart(2,'0');
    document.getElementById('call-status-el').textContent = m + ':' + s;
  }, 1000);
}

function endCall() {
  if (currentChat) socket.emit('call-end', { toId: currentChat.id });
  else if (incomingData) socket.emit('call-end', { toId: incomingData.from.id });
  cleanupCall();
}

function cleanupCall() {
  stopRingtone();
  clearInterval(callTimerInterval); callTimerInterval = null; callSecs = 0;
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (currentCall) { try { currentCall.close(); } catch(e){} currentCall = null; }
  incomingData = null; isMuted = false; isCamOff = false;
  document.getElementById('call-screen').classList.remove('active');
  document.getElementById('mute-btn').textContent = '🎙️';
  document.getElementById('cam-btn').textContent = '📹';
  document.getElementById('mute-btn').classList.remove('on');
  document.getElementById('cam-btn').classList.remove('on');
}

function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🎙️';
  document.getElementById('mute-btn').classList.toggle('on', isMuted);
}

function toggleCam() {
  if (!localStream) return;
  isCamOff = !isCamOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isCamOff);
  document.getElementById('cam-btn').textContent = isCamOff ? '🚫' : '📹';
  document.getElementById('cam-btn').classList.toggle('on', isCamOff);
}

// ── Ringtone ──────────────────────────────────────────────────────────────────
function playRingtone() {
  stopRingtone();
  ringtoneCtx = new (window.AudioContext || window.webkitAudioContext)();
  function beep() {
    const o = ringtoneCtx.createOscillator(), g = ringtoneCtx.createGain();
    o.connect(g); g.connect(ringtoneCtx.destination);
    o.frequency.setValueAtTime(880, ringtoneCtx.currentTime);
    o.frequency.setValueAtTime(660, ringtoneCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ringtoneCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ringtoneCtx.currentTime + 0.45);
    o.start(); o.stop(ringtoneCtx.currentTime + 0.5);
  }
  beep(); ringtoneInt = setInterval(beep, 1200);
  setTimeout(stopRingtone, 30000);
}
function stopRingtone() {
  if (ringtoneInt) { clearInterval(ringtoneInt); ringtoneInt = null; }
  if (ringtoneCtx) { try { ringtoneCtx.close(); } catch(e){} ringtoneCtx = null; }
}

// ── Browser notifications ─────────────────────────────────────────────────────
function showBrowserNotif(name, text) {
  if (document.hasFocus()) return;
  if (Notification.permission === 'granted') {
    new Notification('WAVE — ' + name, { body: text, icon: '/favicon.ico' });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function copyMyId() {
  if (!me) return;
  navigator.clipboard.writeText(me.id).then(() => {
    const el = document.getElementById('my-id-el');
    el.textContent = 'скопировано! ✓';
    setTimeout(() => { el.textContent = 'ID: ' + me.id; }, 1500);
  });
}

function triggerAvatarUpload() {
  document.getElementById('avatar-upload').click();
}

function handleAvatarUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { toast('Файл слишком большой (макс. 2MB)'); return; }

  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    // Save to localStorage
    try { localStorage.setItem('wave_avatar_img', dataUrl); } catch(err) {}
    setAvatarImg(dataUrl);
    toast('✓ Аватар обновлён');
  };
  reader.readAsDataURL(file);
}

function setAvatarImg(dataUrl) {
  const el = document.getElementById('my-avatar-el');
  el.innerHTML = `<img src="${dataUrl}" alt="avatar" />`;
  if (me) me._avatarImg = dataUrl;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('login-name').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  if (currentChat && socket) {
    socket.emit('typing', { toId: currentChat.id, typing: true });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => socket.emit('typing', { toId: currentChat.id, typing: false }), 1500);
  }
});

document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('add-modal')) hideAddContact();
});

document.getElementById('add-id-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('add-confirm-btn').disabled) confirmAddContact();
  if (e.key === 'Escape') hideAddContact();
});

// ── Auto-login ────────────────────────────────────────────────────────────────
(function() {
  try {
    const saved = localStorage.getItem('wave_user');
    if (saved) {
      const user = JSON.parse(saved);
      document.getElementById('login-name').value = user.name;
      const av = document.querySelector(`.av-btn[data-av="${user.avatar}"]`);
      if (av) { document.querySelectorAll('.av-btn').forEach(b => b.classList.remove('selected')); av.classList.add('selected'); selectedAvatar = user.avatar; }
    }
  } catch(e){}
})();
</script>
