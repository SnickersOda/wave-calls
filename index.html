<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>WAVE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--s:#111118;--s2:#1a1a24;--s3:#22222e;--br:rgba(255,255,255,.07);--ac:#7fffb2;--ac2:#4fc3f7;--dn:#ff5252;--tx:#f0f0f8;--mt:rgba(240,240,248,.45);--mbg:rgba(127,255,178,.13);--mbd:rgba(127,255,178,.18)}
[data-theme=ocean]{--bg:#060e18;--s:#0d1b2a;--s2:#122233;--s3:#1a2f42;--br:rgba(79,195,247,.1);--ac:#4fc3f7;--ac2:#7fffb2;--mbg:rgba(79,195,247,.13);--mbd:rgba(79,195,247,.18)}
[data-theme=rose]{--bg:#120a0f;--s:#1e1118;--s2:#2a1622;--s3:#361b2c;--br:rgba(255,100,150,.1);--ac:#ff6496;--ac2:#ffb347;--mbg:rgba(255,100,150,.13);--mbd:rgba(255,100,150,.18)}
[data-theme=void]{--bg:#050507;--s:#0c0c10;--s2:#141418;--s3:#1c1c22;--br:rgba(200,200,255,.06);--ac:#a78bfa;--ac2:#60a5fa;--mbg:rgba(167,139,250,.13);--mbd:rgba(167,139,250,.18)}
[data-theme=amber]{--bg:#0f0a00;--s:#181200;--s2:#221a00;--s3:#2e2300;--br:rgba(255,190,50,.08);--ac:#fbbf24;--ac2:#f87171;--mbg:rgba(251,191,36,.13);--mbd:rgba(251,191,36,.18)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;display:flex;align-items:center;justify-content:center;transition:background .3s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(127,255,178,.025) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(79,195,247,.025) 0%,transparent 60%);pointer-events:none}

/* LOGIN */
#ls{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);overflow-y:auto;padding:20px}
.lbox{width:100%;max-width:380px}
.llogo{text-align:center;margin-bottom:28px}
.llogo h1{font-size:52px;font-weight:800;letter-spacing:-3px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.llogo p{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);letter-spacing:4px;text-transform:uppercase;margin-top:4px}
.lcard{background:var(--s);border:1px solid var(--br);border-radius:22px;padding:26px;position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(127,255,178,.4),transparent)}
.tabs{display:flex;margin-bottom:22px;background:var(--s2);border-radius:11px;padding:3px}
.tab{flex:1;padding:9px;border:none;background:transparent;color:var(--mt);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;transition:all .2s}
.tab.on{background:var(--s3);color:var(--tx)}
.lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mt);margin-bottom:8px;display:block}
.inp{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:11px;padding:12px 15px;color:var(--tx);font-family:'Syne',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .2s;margin-bottom:12px}
.inp:focus{border-color:rgba(127,255,178,.5)}.inp::placeholder{color:var(--mt);font-weight:400;font-size:13px}
.avwrap{display:flex;justify-content:center;margin-bottom:18px}
.avc{width:86px;height:86px;border-radius:50%;border:2px dashed rgba(127,255,178,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--s2);position:relative;overflow:hidden;transition:all .25s}
.avc:hover{border-color:var(--ac);box-shadow:0 0 16px rgba(127,255,178,.3)}
.avc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.avc .ic{font-size:24px}.avc .sm{font-family:'DM Mono',monospace;font-size:9px;color:var(--mt);margin-top:4px;letter-spacing:1px}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(127,255,178,.2),rgba(79,195,247,.2));border:1px solid rgba(127,255,178,.35);border-radius:11px;color:var(--ac);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.lbtn:hover{background:linear-gradient(135deg,rgba(127,255,178,.3),rgba(79,195,247,.3));transform:translateY(-1px)}
.lerr{font-family:'DM Mono',monospace;font-size:11px;color:var(--dn);text-align:center;margin-top:10px;display:none}.lerr.show{display:block}

/* APP */
#app{display:none;width:100%;height:100vh}
#app.on{display:flex}

/* SIDEBAR */
.sb{width:300px;min-width:300px;height:100%;background:var(--s);border-right:1px solid var(--br);display:flex;flex-direction:column;z-index:20;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sbh{padding:12px 10px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:7px;flex-shrink:0}
.mav{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;cursor:pointer;overflow:hidden;transition:box-shadow .2s}
.mav:hover{box-shadow:0 0 12px rgba(127,255,178,.4)}
.mav img,.cav img,.callav img,.profav img,.incav img,.cprofav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.minfo{flex:1;min-width:0}
.mname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mid{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-top:1px;cursor:pointer;transition:color .15s}.mid:hover{color:var(--ac)}
.ibtn{width:27px;height:27px;border-radius:7px;background:transparent;border:1px solid var(--br);color:var(--mt);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ibtn:hover{background:var(--s2);color:var(--tx)}
.sbsearch{padding:8px 10px;border-bottom:1px solid var(--br);flex-shrink:0}
.sbsearch input{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:9px;padding:7px 12px;color:var(--tx);font-family:'Syne',sans-serif;font-size:13px;outline:none}
.sbsearch input:focus{border-color:rgba(127,255,178,.3)}.sbsearch input::placeholder{color:var(--mt);font-size:12px}
.clist{flex:1;overflow-y:auto;padding:4px 0}
.clist::-webkit-scrollbar{width:3px}.clist::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.sb-sec{padding:5px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mt);margin-top:3px}
.ci{padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .15s}
.ci:hover{background:var(--s2)}.ci.act{background:rgba(127,255,178,.07);border-right:2px solid var(--ac)}
.ci.blocked{opacity:.4}
.cav{width:40px;height:40px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative;overflow:hidden}
.od{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#555;border:2px solid var(--s)}.od.on{background:var(--ac)}
.cinfo{flex:1;min-width:0}.cname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cprev{font-size:11px;color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;font-family:'DM Mono',monospace}
.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.ctime{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt)}
.ubadge{background:var(--ac);color:#000;border-radius:10px;padding:2px 7px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.noc{padding:36px 20px;text-align:center;color:var(--mt);font-family:'DM Mono',monospace;font-size:12px;line-height:2.2}
.addbtn{margin:9px 11px;padding:10px;background:rgba(127,255,178,.07);border:1px dashed rgba(127,255,178,.2);border-radius:11px;color:var(--ac);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.addbtn:hover{background:rgba(127,255,178,.13)}

/* CHAT */
.ca{flex:1;height:100%;display:flex;flex-direction:column;min-width:0}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--mt)}
.empty .big{font-size:46px}.empty p{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px}
.chh{padding:11px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:10px;background:var(--s);flex-shrink:0}
.chh .cav{width:36px;height:36px;font-size:16px;cursor:pointer}.chh .cav:hover{opacity:.8}
.chhi{flex:1;cursor:pointer;min-width:0}
.chhn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chhs{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);margin-top:1px}
.cbtns{display:flex;gap:6px;flex-shrink:0}
.cbtn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cbtn.vc{background:var(--s2);color:var(--tx)}.cbtn.vc:hover{background:var(--s3)}
.cbtn.vd{background:rgba(127,255,178,.12);color:var(--ac)}.cbtn.vd:hover{background:rgba(127,255,178,.22)}
.backbtn{display:none;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:18px;background:var(--s2);color:var(--tx);align-items:center;justify-content:center;flex-shrink:0}

/* PIN BAR */
#pinbar{display:none;padding:7px 14px;background:rgba(127,255,178,.06);border-bottom:1px solid rgba(127,255,178,.12);flex-direction:row;align-items:center;gap:9px;cursor:pointer;flex-shrink:0}
#pinbar.show{display:flex}#pinbar:hover{background:rgba(127,255,178,.1)}
.pinicon{font-size:13px;flex-shrink:0}
.pintxt{flex:1;min-width:0;overflow:hidden}
.pintxt strong{color:var(--ac);font-size:10px;display:block;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
#pintxtval{font-size:12px;font-family:'DM Mono',monospace;color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.unpinbtn{background:none;border:none;color:var(--mt);cursor:pointer;font-size:16px;flex-shrink:0;line-height:1}.unpinbtn:hover{color:var(--dn)}

/* MESSAGES */
.ma{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:1px}
.ma::-webkit-scrollbar{width:3px}.ma::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.ddiv{text-align:center;margin:10px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);letter-spacing:2px;text-transform:uppercase}
.typi{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);padding:4px 0;display:none}.typi.show{display:block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes swipeRight{0%{transform:translateX(0)}40%{transform:translateX(20px)}100%{transform:translateX(0)}}

.mw{display:flex;flex-direction:column;margin-bottom:5px}
.mw.mine,.mw.grpmine{align-items:flex-end}.mw.them,.mw.grpthem{align-items:flex-start}
.mb{max-width:70%;padding:9px 12px;border-radius:17px;font-size:14px;line-height:1.55;word-break:break-word;animation:msgIn .18s ease;position:relative}
.mine .mb,.grpmine .mb{background:var(--mbg);border:1px solid var(--mbd);border-bottom-right-radius:4px}
.them .mb,.grpthem .mb{background:var(--s2);border:1px solid var(--br);border-bottom-left-radius:4px}
.mb.del{opacity:.4;font-style:italic;font-size:13px;color:var(--mt)}
.mb.pglow{box-shadow:0 0 0 2px var(--ac),0 0 14px rgba(127,255,178,.2)!important}
.mw.swipe .mb{animation:swipeRight .3s ease}
.grpsender{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac2);margin-bottom:3px;padding-left:2px}
.fwdlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.mmeta{display:flex;align-items:center;gap:5px;margin-top:3px;padding:0 2px}
.mtime{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt)}
.mchk{font-size:11px;color:var(--mt)}.mchk.read{color:var(--ac)}
.rq{background:rgba(127,255,178,.07);border-left:2px solid var(--ac);border-radius:6px;padding:5px 9px;margin-bottom:5px;font-size:12px;color:var(--mt);font-family:'DM Mono',monospace;cursor:pointer;max-width:70%}
.rq strong{color:var(--ac2);display:block;font-size:10px;margin-bottom:2px;text-transform:uppercase;letter-spacing:1px}

/* Reactions */
.mreact{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.rpill{background:var(--s2);border:1px solid var(--br);border-radius:20px;padding:3px 9px;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;user-select:none;line-height:1.3}
.rpill:hover{background:var(--s3);transform:scale(1.08)}
.rpill.me{border-color:var(--ac);background:rgba(127,255,178,.09)}
.rpill span{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt)}

/* Context menu */
.ctxm{position:fixed;background:var(--s);border:1px solid var(--br);border-radius:14px;padding:5px;z-index:200;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:msgIn .15s ease}
.ctxi{padding:9px 14px;border-radius:9px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;transition:background .1s}
.ctxi:hover{background:var(--s2)}.ctxi.dn{color:var(--dn)}
.rpkr{position:fixed;background:var(--s);border:1px solid var(--br);border-radius:16px;padding:9px 12px;display:flex;gap:5px;z-index:201;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:msgIn .15s ease}
.rpkr button{background:none;border:none;font-size:22px;cursor:pointer;padding:3px 5px;border-radius:8px;transition:transform .12s;line-height:1}
.rpkr button:hover{transform:scale(1.4);background:var(--s2)}

/* Media */
.msgimg{max-width:240px;max-height:180px;border-radius:11px;cursor:zoom-in;object-fit:cover;display:block;margin-top:3px}
.msgfile{display:flex;align-items:center;gap:9px;padding:9px 13px;background:var(--s3);border-radius:11px;cursor:pointer;transition:background .15s;margin-top:3px;min-width:170px}
.msgfile:hover{background:rgba(127,255,178,.1)}
.mfi{font-size:22px;flex-shrink:0}.mfname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.mfsize{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-top:1px}
.vmsg{display:flex;align-items:center;gap:9px;min-width:170px}
.vplay{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;background:rgba(127,255,178,.15);color:var(--ac);flex-shrink:0;transition:all .2s}
.vplay:hover{background:rgba(127,255,178,.25)}.vdur{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);flex-shrink:0}

/* Reply / preview bars */
#rbar{display:none;padding:8px 13px;background:var(--s2);border-top:1px solid var(--br);flex-direction:row;align-items:center;gap:9px;flex-shrink:0}
#rbar.show{display:flex}
#rbartxt{flex:1;font-size:12px;color:var(--mt);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#rbartxt strong{color:var(--ac2)}
.rcls{background:none;border:none;color:var(--mt);cursor:pointer;font-size:17px;line-height:1}.rcls:hover{color:var(--tx)}
#iprev{display:none;padding:8px 13px;background:var(--s2);border-top:1px solid var(--br);flex-direction:row;align-items:center;gap:10px;flex-shrink:0}
#iprev.show{display:flex}
#iprevthumb{width:56px;height:56px;border-radius:9px;object-fit:cover;border:1px solid var(--br);flex-shrink:0}
#iprevinfo{flex:1;min-width:0}.iprevname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iprevsize{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-top:2px}
.psbtn{padding:7px 14px;border-radius:9px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600}
.psbtn.ok{background:var(--ac);color:#000}.psbtn.no{background:var(--s3);color:var(--tx)}

/* Input */
.cinpw{padding:9px 11px;padding-bottom:max(9px,env(safe-area-inset-bottom));border-top:1px solid var(--br);background:var(--s);flex-shrink:0}
.cinpr{display:flex;gap:7px;align-items:flex-end}
.attbtn{width:37px;height:37px;border-radius:11px;border:1px solid var(--br);background:var(--s2);color:var(--mt);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.attbtn:hover{background:var(--s3);color:var(--tx)}
.minp{flex:1;background:var(--s2);border:1px solid var(--br);border-radius:13px;padding:9px 13px;color:var(--tx);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none;max-height:90px;line-height:1.5;transition:border-color .2s}
.minp:focus{border-color:rgba(127,255,178,.4)}.minp::placeholder{color:var(--mt)}
.sndbtn,.vrecbtn{width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sndbtn{background:var(--ac);color:#000}.sndbtn:hover{transform:scale(1.06)}
.vrecbtn{background:var(--s2);border:1px solid var(--br);color:var(--mt)}.vrecbtn:hover{color:var(--tx)}
.vrecbtn.rec{background:rgba(255,82,82,.18);border-color:var(--dn);color:var(--dn);animation:pulse 1s infinite}

/* Modals */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(14px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.mo.on{display:flex}
.md{background:var(--s);border:1px solid var(--br);border-radius:20px;padding:24px;width:100%;max-width:340px;position:relative;max-height:90vh;overflow-y:auto}
.md::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(127,255,178,.3),transparent);border-radius:20px 20px 0 0}
.mdt{font-size:16px;font-weight:700;margin-bottom:16px}
.mdinp{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:10px 13px;color:var(--tx);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:9px}
.mdinp:focus{border-color:rgba(127,255,178,.4)}.mdinp::placeholder{color:var(--mt);font-size:13px}
.mdprev{background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:10px 13px;margin-bottom:9px;display:none;align-items:center;gap:9px}
.mdprev.show{display:flex}
.mderr{font-family:'DM Mono',monospace;font-size:11px;color:var(--dn);margin-bottom:9px;display:none}.mderr.show{display:block}
.mdbtns{display:flex;gap:8px}
.mdb{flex:1;padding:10px;border-radius:10px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;transition:all .2s}
.mdb.p{background:var(--ac);color:#000}.mdb.p:hover{transform:translateY(-1px)}.mdb.p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.mdb.sec{background:var(--s2);border:1px solid var(--br);color:var(--tx)}.mdb.sec:hover{background:var(--s3)}
.mdb.danger{background:rgba(255,82,82,.15);border:1px solid rgba(255,82,82,.3);color:var(--dn)}.mdb.danger:hover{background:rgba(255,82,82,.25)}

/* Profile */
.profavw{display:flex;justify-content:center;margin-bottom:16px}
.profav{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;overflow:hidden;position:relative;transition:box-shadow .2s}
.profav:hover{box-shadow:0 0 14px rgba(127,255,178,.35)}.profav::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;font-size:22px;border-radius:50%}.profav:hover::after{display:flex}
.cprofav{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;margin:0 auto 12px}
.cprofname{font-size:18px;font-weight:800;text-align:center;margin-bottom:3px}
.cprofun{font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);text-align:center;margin-bottom:3px}
.cprofid{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);text-align:center;margin-bottom:12px}
.cprofst{font-family:'DM Mono',monospace;font-size:11px;text-align:center;margin-bottom:14px}

/* Themes */
.themes-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.theme-btn{padding:12px;border-radius:12px;border:2px solid var(--br);background:var(--s2);cursor:pointer;transition:all .2s;text-align:center}
.theme-btn:hover{border-color:rgba(127,255,178,.3)}.theme-btn.active{border-color:var(--ac)}
.theme-dot{width:24px;height:24px;border-radius:50%;margin:0 auto 6px}
.theme-name{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt)}

/* Forward */
.fwdlist{max-height:240px;overflow-y:auto;margin-bottom:12px}
.fwditem{padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;border-radius:10px;transition:background .15s}
.fwditem:hover{background:var(--s2)}.fwditem.sel{background:rgba(127,255,178,.1);border:1px solid rgba(127,255,178,.2)}
.fwditem .fwdav{width:34px;height:34px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;flex-shrink:0}
.fwditem .fwdav img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Group create */
.mplist{max-height:200px;overflow-y:auto;margin-bottom:12px;border:1px solid var(--br);border-radius:10px}
.mpitem{padding:8px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .15s}
.mpitem:hover{background:var(--s2)}.mpitem.sel{background:rgba(127,255,178,.08)}
.mpitem .mpav{width:30px;height:30px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0}
.mpitem .mpav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.mpchk{width:16px;height:16px;border-radius:4px;border:2px solid var(--br);margin-left:auto;flex-shrink:0}
.mpitem.sel .mpchk{background:var(--ac);border-color:var(--ac)}

/* Lightbox */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:600;display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lb.on{display:flex}#lbimg{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px}

/* CALL */
#cs{display:none;position:fixed;inset:0;z-index:300;background:var(--bg)}
#cs.on{display:flex;flex-direction:column;align-items:center;justify-content:center}
.vwrap{position:relative;width:100%;height:100%}
#rvid{width:100%;height:100%;object-fit:cover;background:#050508}
#lvid{position:absolute;bottom:108px;right:14px;width:115px;height:154px;object-fit:cover;border-radius:12px;border:2px solid rgba(255,255,255,.2);box-shadow:0 8px 28px rgba(0,0,0,.6)}
.vsc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:13px;padding:40px;width:100%}
.callav{width:94px;height:94px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;overflow:hidden}
.callav::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(127,255,178,.2);animation:rpl 2s ease-out infinite}
@keyframes rpl{0%{transform:scale(.9);opacity:1}100%{transform:scale(1.45);opacity:0}}
.calln{font-size:23px;font-weight:800}.callst{font-family:'DM Mono',monospace;font-size:13px;color:var(--mt)}
.wave{display:flex;align-items:center;gap:3px;height:24px}
.wb{width:3px;border-radius:2px;background:var(--ac);animation:wa 1.2s ease-in-out infinite}
.wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.1s}.wb:nth-child(3){animation-delay:.2s}.wb:nth-child(4){animation-delay:.3s}.wb:nth-child(5){animation-delay:.2s}.wb:nth-child(6){animation-delay:.1s}.wb:nth-child(7){animation-delay:0s}
@keyframes wa{0%,100%{height:4px;opacity:.4}50%{height:18px;opacity:1}}
.cctrl{position:absolute;bottom:0;left:0;right:0;padding:18px 20px 32px;display:flex;justify-content:center;gap:12px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);flex-wrap:wrap}
.ctrl{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;background:rgba(255,255,255,.1);color:#fff;backdrop-filter:blur(10px);flex-direction:column;gap:2px}
.ctrl small{font-size:8px;font-family:'DM Mono',monospace;opacity:.7;line-height:1}
.ctrl:hover{transform:scale(1.08)}.ctrl.on{background:rgba(127,255,178,.2);color:var(--ac)}
.ctrl.end{background:var(--dn);width:60px;height:60px;font-size:22px}.ctrl.end:hover{background:#ff3333}
.ctrl.scr.sharing{background:rgba(79,195,247,.2);color:var(--ac2)}

/* Incoming */
#inc{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(24px);z-index:400;flex-direction:column;align-items:center;justify-content:center;gap:14px}

.incbtn::after{content:'';position:absolute;inset:-7px;border-radius:50%;animation:rpl 1.4s ease-out infinite}
.inacc{background:#1db954;color:#fff}.inacc::after{border:2px solid #1db954}
.indec{background:var(--dn);color:#fff}.indec::after{border:2px solid var(--dn);animation-delay:.15s}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s2);border:1px solid var(--br);border-radius:11px;padding:9px 17px;font-family:'DM Mono',monospace;font-size:12px;z-index:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:640px){

const EMOJIS=['👍','❤️','😂','😮','😢','🔥','🎉','💯'];
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtSz=b=>b>1048576?(b/1048576).toFixed(1)+' MB':Math.round(b/1024)+' KB';
const fmtDur=s=>{const m=Math.floor(s/60),ss=s%60;return m+':'+String(ss).padStart(2,'0')};

let me=null,sock=null,peer=null;

let lStream=null,scrStream=null,curCall=null;
let isVid=false,muted=false,camOff=false,sharing=false,incData=null;

// ── AVATAR CACHE ──────────────────────────────────────────────────────────────
function getAVs(){try{return JSON.parse(localStorage.getItem('w_av')||'{}')}catch(e){return{}}}
function setAV(id,img){try{const a=getAVs();if(img)a[id]=img;else delete a[id];localStorage.setItem('w_av',JSON.stringify(a))}catch(e){}}
function renderAV(el,uid,emoji){
  const img=getAVs()[uid];
  if(img){el.innerHTML=`<img src="${img}">`;el.style.fontSize='';}
  else{el.innerHTML='';el.textContent=emoji||'👤';}
}

// ── SESSION / AUTO-LOGIN ──────────────────────────────────────────────────────
async function tryAutoLogin(){
  const token=localStorage.getItem('w_token');
  if(!token)return false;
  try{
    const r=await fetch('/api/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
    if(!r.ok){localStorage.removeItem('w_token');return false;}
    const d=await r.json();
    me=d;if(d.avatar_img)setAV(d.id,d.avatar_img);
    return true;
  }catch(e){return false;}
}

async function loadBlocks(){

function isBlocked(id){return blockedUsers.has(id);}
async function toggleBlock(){
  if(!chat||chat.isFav||chat.isGroup)return;
  const id=chat.id;
  if(isBlocked(id)){
    await fetch(`/api/blocks/${me.id}/${id}`,{method:'DELETE'});

  renderSidebar();

// ── SOCKET ────────────────────────────────────────────────────────────────────
function connectSock(){
  sock=io();sock.emit('join',{userId:me.id});

  sock.on('message',async msg=>{
    if(msg.file_data){
      if(msg.type==='voice')window['_v'+msg.id]=msg.file_data;
      else if(msg.type==='file')window['_f'+msg.id]=msg.file_data;
      else if(msg.type==='image')window['_i'+msg.id]=msg.file_data;
    }
    const inCurrent=chat&&(
      (msg.group_id&&msg.group_id===chat.id)||
      (!msg.group_id&&!chat.isGroup&&!chat.isFav&&(msg.from_id===chat.id||msg.to_id===chat.id))
    );
    if(inCurrent){
      appendMsg(msg);
      sock.emit('read',{fromId:msg.from_id,groupId:msg.group_id||null});
    }
    if(msg.from_id!==me.id&&!isBlocked(msg.from_id)){
      if(msg.group_id){
        const g=groups.find(x=>x.id===msg.group_id);
        if(g){updateGPrev(g,msg);if(!inCurrent){g.unread=(g.unread||0)+1;playPing();showNotif(g.name,msg.text||'📎');}}
      } else {
        let c=contacts.find(x=>x.id===msg.from_id);
        if(!c){
          try{const r=await fetch('/api/user/'+msg.from_id);if(r.ok){const u=await r.json();if(u.avatar_img)setAV(u.id,u.avatar_img);c={...u,online:true,unread:0};contacts.unshift(c);}}catch(e){}
        }
        if(c){
          updateCPrev(c,msg);
          if(!inCurrent){c.unread=(c.unread||0)+1;playPing();
            const pv=msg.forwarded?'↗️ переслано':msg.type==='voice'?'🎤 Голосовое':msg.type==='image'?'📷 Фото':msg.type==='file'?'📎 '+msg.file_name:msg.text||'';
            showNotif(c.name,pv);}
        }
      }
    } else if(msg.from_id===me.id){
      if(msg.group_id){const g=groups.find(x=>x.id===msg.group_id);if(g)updateGPrev(g,msg);}
      else{const c=contacts.find(x=>x.id===msg.to_id);if(c)updateCPrev(c,msg);}
    }
    renderSidebar();
  });

  sock.on('presence',({userId,online})=>{
    const c=contacts.find(x=>x.id===userId);
    if(c){c.online=online;renderSidebar();if(chat&&!chat.isGroup&&!chat.isFav&&chat.id===userId)setChatSt();}
  });

  sock.on('typing',({fromId,typing})=>{
    if(!chat)return;
    const rel=chat.isGroup?true:(fromId===chat.id);
    if(rel)document.getElementById('typi').classList.toggle('show',typing);
  });

  sock.on('read',({byId})=>{
    if(chat&&!chat.isGroup&&!chat.isFav&&byId===chat.id)
      document.querySelectorAll('.mchk').forEach(e=>e.classList.add('read'));
  });

  sock.on('reaction-update',({msgId,reactions})=>{
    const el=document.querySelector(`.mreact[data-mid="${msgId}"]`);
    if(el)renderReacts(el,msgId,reactions);
  });

  sock.on('message-deleted',({msgId})=>{
    const el=document.querySelector(`.mw[data-id="${msgId}"] .mb`);
    if(el){el.classList.add('del');el.innerHTML='Сообщение удалено';}
  });

  // Pins synced via socket
  sock.on('pin-update',({chatKey,msgId,text})=>{
    if(getChatKey()===chatKey){
      chatPin={msgId,text};showPinBar();
      // Glow the pinned message
      document.querySelectorAll('.mb.pglow').forEach(e=>e.classList.remove('pglow'));
      document.querySelector(`.mw[data-id="${msgId}"] .mb`)?.classList.add('pglow');
    }
  });
  sock.on('unpin',({chatKey})=>{
    if(getChatKey()===chatKey){chatPin=null;hidePinBar();document.querySelectorAll('.mb.pglow').forEach(e=>e.classList.remove('pglow'));}
  });

  sock.on('user-updated',u=>{
    if(u.avatar_img)setAV(u.id,u.avatar_img);
    const c=contacts.find(x=>x.id===u.id);
    if(c){c.name=u.name;c.username=u.username;renderSidebar();}
    if(chat&&!chat.isGroup&&!chat.isFav&&chat.id===u.id){
      document.getElementById('chname').textContent=u.name;
      renderAV(document.getElementById('chav'),u.id,u.avatar||'👤');
    }
  });

  sock.on('group-added',g=>{
    if(!groups.find(x=>x.id===g.id)){groups.unshift(g);renderSidebar();}
  });

  sock.on('call-invite',({from,callType,peerId})=>{
    if(isBlocked(from.id))return;
    incData={from,callType,peerId};if(from.avatar_img)setAV(from.id,from.avatar_img);
    renderAV(document.getElementById('incav'),from.id,from.avatar||'👤');
    document.getElementById('incname').textContent=from.name;
    document.getElementById('inctype').textContent=callType==='video'?'📹 видеозвонок':'🎙️ голосовой';
    document.getElementById('inc').classList.add('on');playRing();
  });
  sock.on('call-accept',({peerId})=>connectCall(peerId,isVid));
  sock.on('call-decline',()=>{toast('Звонок отклонён');cleanupCall();});
  sock.on('call-end',()=>cleanupCall());
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getChatKey(){
  if(!chat||chat.isFav)return null;
  if(chat.isGroup)return 'g:'+chat.id;
  return [me.id,chat.id].sort().join(':');
}
function updateCPrev(c,msg){
  const p=msg.forwarded?'↗️ переслано':msg.type==='voice'?'🎤 Голосовое':msg.type==='image'?'📷 Фото':msg.type==='file'?'📎 '+msg.file_name:msg.text||'';
  c._prev=(msg.from_id===me.id?'ты: ':'')+p;
  const d=new Date(msg.created_at*1000);c._time=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function updateGPrev(g,msg){
  const sn=msg.from_id===me.id?'ты':(contacts.find(x=>x.id===msg.from_id)?.name||'?');
  const p=msg.type==='voice'?'🎤':msg.type==='image'?'📷':msg.type==='file'?'📎':msg.text||'';
  g._prev=sn+': '+p;
  const d=new Date(msg.created_at*1000);g._time=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function avHtml(id,emoji){

function renderSidebar(f){
  if(f===undefined)f=document.getElementById('sbsi').value||'';
  const fl=f.toLowerCase().replace(/^@/,'');
  const list=document.getElementById('clist');

  // Favorites row
  const favRow=`<div class="ci${chat&&chat.isFav?' act':''}" onclick="openFavorites()">
    <div class="cav" style="background:linear-gradient(135deg,var(--ac),var(--ac2));font-size:18px">⭐</div>
    <div class="cinfo"><div class="cname">Избранное</div><div class="cprev">Сохранённые сообщения</div></div>
  </div>`;

  // Groups
  let gItems=fl?groups.filter(g=>g.name.toLowerCase().includes(fl)):groups;
  const gHtml=gItems.length?`<div class="sb-sec">Группы</div>`+gItems.map(g=>`
    <div class="ci${chat&&chat.id===g.id?' act':''}" onclick="openGroupChat('${g.id}')">
      <div class="cav">${avHtml(g.id,g.avatar||'👥')}</div>
      <div class="cinfo"><div class="cname">${esc(g.name)}</div><div class="cprev">${esc(g._prev||((g.members?.length||0)+' уч.'))}</div></div>
      <div class="cmeta">${g._time?`<div class="ctime">${g._time}</div>`:''}${g.unread?`<div class="ubadge">${g.unread}</div>`:''}</div>
    </div>`).join(''):'';

  // Contacts
  let cItems=fl?contacts.filter(c=>c.name.toLowerCase().includes(fl)||(c.username||'').includes(fl)||(c.id||'').toLowerCase().includes(fl)):contacts;
  const cHtml=cItems.length?`<div class="sb-sec">Контакты</div>`+cItems.map(c=>{
    const blk=isBlocked(c.id);
    return `<div class="ci${chat&&chat.id===c.id?' act':''}${blk?' blocked':''}" onclick="openChat('${c.id}')">
      <div class="cav">${avHtml(c.id,c.avatar||'👤')}<div class="od${c.online&&!blk?' on':''}"></div></div>
      <div class="cinfo"><div class="cname">${esc(c.name)}${blk?' 🚫':''}</div><div class="cprev">${esc(c._prev||(c.username?'@'+c.username:c.id))}</div></div>
      <div class="cmeta">${c._time?`<div class="ctime">${c._time}</div>`:''}${c.unread&&!blk?`<div class="ubadge">${c.unread}</div>`:''}</div>
    </div>`;
  }).join(''):`<div class="noc">${fl?'Не найдено':'Контактов нет.<br>Нажми ＋ чтобы добавить.'}</div>`;

  // Search results from server
  const srHtml=searchResults.length&&fl?`<div class="sb-sec">Найдено в сети</div>`+searchResults.filter(u=>u.id!==me.id&&!contacts.find(c=>c.id===u.id)).map(u=>
    `<div class="ci" onclick="quickAddContact('${u.id}')">
      <div class="cav">${avHtml(u.id,u.avatar||'👤')}<div class="od${u.online?' on':''}"></div></div>
      <div class="cinfo"><div class="cname">${esc(u.name)} <span style="color:var(--ac);font-size:11px">＋</span></div><div class="cprev">${u.username?'@'+u.username:u.id}</div></div>
    </div>`).join(''):'';

  list.innerHTML=favRow+gHtml+cHtml+srHtml;
}

let srchTimer=null;
async function handleSearch(v){
  clearTimeout(srchTimer);
  const q=v.trim();
  if(!q){searchResults=[];renderSidebar('');return;}
  renderSidebar(q);
  if(q.length>=2){
    srchTimer=setTimeout(async()=>{
      try{const r=await fetch('/api/search/'+encodeURIComponent(q));
        const d=await r.json();searchResults=d;
        d.forEach(u=>{if(u.avatar_img)setAV(u.id,u.avatar_img);});
        renderSidebar(q);}catch(e){}
    },350);
  }
}

function renderMsgs(msgs){

    if(m.file_data){

      else if(m.type==='file')window['_f'+m.id]=m.file_data;
      else if(m.type==='image')window['_i'+m.id]=m.file_data;
    }
  });
  let lastDate=null;
  msgs.forEach(m=>{
    const d=new Date(m.created_at*1000);
    const ds=d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    if(ds!==lastDate){lastDate=ds;const div=document.createElement('div');div.className='ddiv';div.textContent=ds;area.appendChild(div);}
    appendMsg(m,false);
  });

// ── APPEND MESSAGE ────────────────────────────────────────────────────────────
function appendMsg(msg,scroll=true){
  const area=document.getElementById('ma');
  const mine=msg.from_id===me.id;
  const d=new Date(msg.created_at*1000);
  const time=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  const reacts=typeof msg.reactions==='string'?JSON.parse(msg.reactions||'{}'):(msg.reactions||{});

  const wrap=document.createElement('div');
  wrap.dataset.id=msg.id;wrap.dataset.from=msg.from_id;

  if(chat?.isGroup)wrap.className='mw '+(mine?'grpmine':'grpthem');
  else wrap.className='mw '+(mine?'mine':'them');

  // Group sender name
  let senderHtml='';
  if(chat?.isGroup&&!mine){
    const member=chat.members?.find(x=>x.id===msg.from_id);
    senderHtml=`<div class="grpsender">${esc(member?.name||msg.from_id)}</div>`;
  }

  // Forwarded label
  const fwdHtml=msg.forwarded?`<div class="fwdlbl">↗️ переслано</div>`:'';

  // Reply quote
  let rqHtml='';
  if(msg.reply_to){
    const rw=document.querySelector(`.mw[data-id="${msg.reply_to}"]`);
    const rb=rw?.querySelector('.mb');
    let refTxt='...';
    if(rb&&!rb.classList.contains('del')){
      const cl=rb.cloneNode(true);cl.querySelectorAll('img,svg,button,.fwdlbl,.grpsender').forEach(el=>el.remove());
      refTxt=cl.textContent.trim().replace(/\s+/g,' ').slice(0,80)||
        (rb.querySelector('img')?'📷 Фото':rb.querySelector('.vmsg')?'🎤 Голосовое':'📎 Файл');
    }
    rqHtml=`<div class="rq" onclick="scrollToMsg('${msg.reply_to}')"><strong>↩ ответ</strong>${esc(refTxt)}</div>`;
  }

  // Content
  let content='';
  if(msg.deleted){
    content='<div class="mb del">Сообщение удалено</div>';
  } else if(msg.type==='image'){
    const src=msg.file_data||window['_i'+msg.id]||'';
    content=`<div class="mb" style="padding:5px"><img class="msgimg" src="${src}"/></div>`;
  } else if(msg.type==='file'){
    content=`<div class="mb"><div class="msgfile" onclick="dlFile('${msg.id}','${esc(msg.file_name||'file')}')">
      <div class="mfi">📎</div><div><div class="mfname">${esc(msg.file_name||'файл')}</div><div class="mfsize">${msg.file_size?fmtSz(msg.file_size):''}</div></div>
    </div></div>`;
  } else if(msg.type==='voice'){
    content=`<div class="mb"><div class="vmsg">
      <button class="vplay" id="vp${msg.id}" onclick="playVoice('${msg.id}')">▶</button>
      <div style="flex:1">${waveSVG()}</div>
      <span class="vdur">${msg.file_size?fmtDur(Math.round(msg.file_size/16)):''}</span>
    </div></div>`;
  } else {
    content=`<div class="mb">${esc(msg.text||'').replace(/\n/g,'<br>')}</div>`;
  }

  const reactHtml=`<div class="mreact" data-mid="${msg.id}"></div>`;
  const metaHtml=`<div class="mmeta"><span class="mtime">${time}</span>${mine&&!chat?.isGroup&&!chat?.isFav?`<span class="mchk${msg.read?' read':''}">✓✓</span>`:''}</div>`;

  wrap.innerHTML=senderHtml+fwdHtml+rqHtml+content+reactHtml+metaHtml;

  if(Object.keys(reacts).length){
    const rel=wrap.querySelector('.mreact');if(rel)renderReacts(rel,msg.id,reacts);
  }
  if(chatPin?.msgId===msg.id)wrap.querySelector('.mb')?.classList.add('pglow');

  if(!msg.deleted){
    const bub=wrap.querySelector('.mb');
    if(bub){
      bub.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e,msg,mine);});
      bub.addEventListener('dblclick',e=>{e.preventDefault();setReply(msg);swipeAnim(wrap);});
      let pt;
      bub.addEventListener('touchstart',e=>{pt=setTimeout(()=>showCtx(e.touches[0],msg,mine),500);},{passive:true});
      bub.addEventListener('touchend',()=>clearTimeout(pt));
      bub.addEventListener('touchmove',()=>clearTimeout(pt));
    }
  }
  if(msg.type==='image'&&!msg.deleted){
    const bub=wrap.querySelector('.mb');
    if(bub)bub.addEventListener('click',()=>{const s=window['_i'+msg.id]||bub.querySelector('img')?.src||'';if(s)openLB(s);});
  }

  area.insertBefore(wrap,document.getElementById('typi'));
  if(scroll)area.scrollTop=area.scrollHeight;
}

function swipeAnim(w){w.classList.add('swipe');setTimeout(()=>w.classList.remove('swipe'),300);}

// ── SEND ──────────────────────────────────────────────────────────────────────
async function sendMsg(){
  const inp=document.getElementById('minp');const text=inp.value.trim();
  if(!text||!chat)return;
  if(!chat.isFav&&!chat.isGroup&&isBlocked(chat.id)){toast('Пользователь заблокирован');return;}
  if(chat.isFav){
    const msg={id:'fav_'+Date.now(),from_id:me.id,to_id:'__fav__',text,type:'text',created_at:Math.floor(Date.now()/1000),reactions:{},deleted:0,forwarded:0};
    const favs=JSON.parse(localStorage.getItem('w_fav')||'[]');favs.push(msg);
    localStorage.setItem('w_fav',JSON.stringify(favs.slice(-500)));
    appendMsg(msg);
  } else {
    sock.emit('message',{toId:chat.isGroup?null:chat.id,groupId:chat.isGroup?chat.id:null,text,type:'text',replyTo:replyTo?.id||null});
    if(!chat.isGroup)sock.emit('typing',{toId:chat.id,typing:false});
  }
  inp.value='';inp.style.height='auto';clearReply();
}

// ── FILE ──────────────────────────────────────────────────────────────────────
function handleFile(e){
  const f=e.target.files[0];if(!f||!chat)return;
  if(f.size>10*1024*1024){toast('Макс. 10MB');e.target.value='';return;}
  const r=new FileReader();
  r.onload=ev=>{
    const isImg=f.type.startsWith('image/');
    pendingF={file:f,data:ev.target.result,type:isImg?'image':'file'};
    if(isImg){
      document.getElementById('iprevthumb').src=ev.target.result;
      document.getElementById('iprevname').textContent=f.name;
      document.getElementById('iprevsize').textContent=fmtSz(f.size);
      document.getElementById('iprev').classList.add('show');
    } else sendPending();
  };
  r.readAsDataURL(f);e.target.value='';
}
function sendPending(){
  if(!pendingF||!chat)return;
  if(chat.isFav){toast('Файлы в Избранном не поддерживаются');cancelPrev();return;}
  sock.emit('message',{toId:chat.isGroup?null:chat.id,groupId:chat.isGroup?chat.id:null,type:pendingF.type,fileName:pendingF.file.name,fileSize:pendingF.file.size,fileData:pendingF.data,replyTo:replyTo?.id||null});
  cancelPrev();clearReply();
}
function cancelPrev(){pendingF=null;document.getElementById('iprev').classList.remove('show');}

// ── VOICE ─────────────────────────────────────────────────────────────────────
async function toggleVoice(){
  if(!recording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mrec=new MediaRecorder(stream);aChunks=[];
      mrec.ondataavailable=e=>aChunks.push(e.data);
      mrec.onstop=()=>{
        const blob=new Blob(aChunks,{type:'audio/webm'});
        const r=new FileReader();
        r.onload=ev=>{sock.emit('message',{toId:chat.isGroup?null:chat.id,groupId:chat.isGroup?chat.id:null,type:'voice',fileName:'voice.webm',fileSize:Math.round(blob.size/1000),fileData:ev.target.result});};
        r.readAsDataURL(blob);stream.getTracks().forEach(t=>t.stop());
      };
      mrec.start();recording=true;document.getElementById('vrecbtn').classList.add('rec');
    }catch(e){toast('Нет доступа к микрофону');}
  } else {mrec.stop();recording=false;document.getElementById('vrecbtn').classList.remove('rec');}
}
function playVoice(id){
  const data=window['_v'+id];if(!data){toast('Аудио недоступно');return;}
  const audio=new Audio(data);const btn=document.getElementById('vp'+id);if(!btn)return;
  btn.textContent='⏸';audio.play().catch(()=>toast('Ошибка воспроизведения'));
  audio.onended=()=>{if(btn)btn.textContent='▶';};
  btn.onclick=()=>{audio.pause();if(btn)btn.textContent='▶';btn.onclick=()=>playVoice(id);};
}
function dlFile(id,name){
  const data=window['_f'+id];if(!data){toast('Файл недоступен');return;}
  const a=document.createElement('a');a.href=data;a.download=name;a.click();
}

    ...(!chat?.isFav?[{ic:'📌',lb:'Закрепить',fn:()=>pinMsg(msg)}]:[]),
    ...(mine?[{ic:'🗑️',lb:'Удалить',dn:true,fn:()=>delMsg(msg)}]:[])

function renderReacts(el,msgId,reactions){
  el.innerHTML=Object.entries(reactions).filter(([,u])=>u.length>0).map(([em,users])=>{

    const names=users.map(u=>{if(u===me.id)return 'ты';return contacts.find(x=>x.id===u)?.name||u;}).join(', ');
    return `<div class="rpill${isMe?' me':''}" onclick="sendReact('${msgId}','${em}');event.stopPropagation()" title="${esc(names)}">${em}<span>${users.length}</span></div>`;

function saveToFav(msg){

}

let lkpT=null;
function showAdd(){document.getElementById('addmo').classList.add('on');setTimeout(()=>document.getElementById('addinp').focus(),100);}

  document.getElementById('addmo').classList.remove('on');

function lookupUser(val){
  clearTimeout(lkpT);const q=val.trim();
  if(q.length<2){document.getElementById('mdprev').classList.remove('show');document.getElementById('mderr').classList.remove('show');document.getElementById('addok').disabled=true;return;}
  lkpT=setTimeout(async()=>{
    try{
      const id=q.replace(/^@/,'');
      const r=await fetch('/api/user/'+encodeURIComponent(id));
      if(!r.ok)throw 0;const u=await r.json();
      if(u.id===me.id){setMdErr('Это ты 😄');return;}
      foundU=u;if(u.avatar_img)setAV(u.id,u.avatar_img);
      renderAV(document.getElementById('prevav'),u.id,u.avatar||'👤');
      document.getElementById('prevname').textContent=u.name;
      document.getElementById('prevun').textContent=u.username?'@'+u.username:'ID: '+u.id;
      document.getElementById('mdprev').classList.add('show');
      document.getElementById('mderr').classList.remove('show');
      document.getElementById('addok').disabled=false;
    }catch(e){setMdErr('Пользователь не найден');foundU=null;}
  },400);
}
function setMdErr(m){document.getElementById('mderr').textContent=m;document.getElementById('mderr').classList.add('show');document.getElementById('mdprev').classList.remove('show');document.getElementById('addok').disabled=true;}
async function confirmAdd(){
  if(!foundU)return;
  const r=await fetch('/api/contacts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ownerId:me.id,contactId:foundU.id})});
  const c=await r.json();if(!r.ok){toast(c.error||'Ошибка');return;}
  if(c.avatar_img)setAV(c.id,c.avatar_img);contacts.unshift(c);renderSidebar();hideAdd();toast('✓ '+c.name+' добавлен');openChat(c.id);
}

// ── CALLS ─────────────────────────────────────────────────────────────────────
async function callC(video){
  if(!chat||chat.isGroup||chat.isFav)return;
  if(isBlocked(chat.id)){toast('Пользователь заблокирован');return;}
  isVid=video;
  try{lStream=await navigator.mediaDevices.getUserMedia({audio:true,video:video?{width:1280,height:720}:false});}
  catch(e){toast('Нет доступа к '+(video?'камере':'микрофону'));return;}
  showCallScreen(chat,video,true);
  sock.emit('call-invite',{toId:chat.id,callType:video?'video':'voice',peerId:peer.id});
}
function connectCall(pid,video){
  const call=peer.call(pid,lStream);curCall=call;
  document.getElementById('callst').textContent='соединяемся...';
  call.on('stream',s=>showRemote(s,video));call.on('close',()=>cleanupCall());
}
async function acceptCall(){
  stopRing();document.getElementById('inc').classList.remove('on');if(!incData)return;
  isVid=incData.callType==='video';
  try{lStream=await navigator.mediaDevices.getUserMedia({audio:true,video:isVid?{width:1280,height:720}:false});}
  catch(e){toast('Нет доступа к микрофону');return;}
  const caller=contacts.find(c=>c.id===incData.from.id)||incData.from;
  showCallScreen(caller,isVid,false);
  sock.emit('call-accept',{toId:incData.from.id,peerId:peer.id});
  peer.on('call',call=>{
    call.answer(lStream);curCall=call;
    document.getElementById('callst').textContent='соединяемся...';
    call.on('stream',s=>showRemote(s,isVid));call.on('close',()=>cleanupCall());
  });
}
function declineCall(){
  stopRing();document.getElementById('inc').classList.remove('on');
  if(incData)sock.emit('call-decline',{toId:incData.from.id});incData=null;
}
function showCallScreen(c,video,out){
  document.getElementById('cs').classList.add('on');
  renderAV(document.getElementById('callav'),c.id,c.avatar||'👤');
  document.getElementById('calln').textContent=c.name||c.id;
  document.getElementById('callst').textContent=out?'звоним...':'входящий...';
  document.getElementById('vidui').style.display=video?'block':'none';
  document.getElementById('voiceui').style.display=video?'none':'flex';
  document.getElementById('cambtn').style.display=video?'flex':'none';
  document.getElementById('scrbtn').style.display=video?'flex':'none';
  if(video)document.getElementById('lvid').srcObject=lStream;
}
function showRemote(stream,video){
  document.getElementById('callst').textContent='00:00';
  callSecs=0;callTimer=setInterval(()=>{callSecs++;const m=String(Math.floor(callSecs/60)).padStart(2,'0'),s=String(callSecs%60).padStart(2,'0');document.getElementById('callst').textContent=m+':'+s;},1000);
  if(video)document.getElementById('rvid').srcObject=stream;
  else{const a=new Audio();a.srcObject=stream;a.play();}
}
function endCall(){const toId=chat?.id||incData?.from?.id;if(toId)sock.emit('call-end',{toId});cleanupCall();}
function cleanupCall(){
  stopRing();clearInterval(callTimer);callTimer=null;callSecs=0;
  if(lStream){lStream.getTracks().forEach(t=>t.stop());lStream=null;}
  if(scrStream){scrStream.getTracks().forEach(t=>t.stop());scrStream=null;}
  if(curCall){try{curCall.close();}catch(e){}curCall=null;}
  incData=null;muted=false;camOff=false;sharing=false;
  document.getElementById('cs').classList.remove('on');
  document.getElementById('mutebtn').textContent='🎙️';document.getElementById('mutebtn').classList.remove('on');
  document.getElementById('cambtn').textContent='📹';document.getElementById('cambtn').classList.remove('on');
  document.getElementById('scrbtn').classList.remove('sharing');
}
function togMute(){if(!lStream)return;muted=!muted;lStream.getAudioTracks().forEach(t=>t.enabled=!muted);document.getElementById('mutebtn').textContent=muted?'🔇':'🎙️';document.getElementById('mutebtn').classList.toggle('on',muted);}
function togCam(){if(!lStream)return;camOff=!camOff;lStream.getVideoTracks().forEach(t=>t.enabled=!camOff);document.getElementById('cambtn').textContent=camOff?'🚫':'📹';document.getElementById('cambtn').classList.toggle('on',camOff);}
async function togScreen(){
  if(!sharing){
    try{
      scrStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
      const track=scrStream.getVideoTracks()[0];
      if(curCall?.peerConnection){const s=curCall.peerConnection.getSenders().find(s=>s.track?.kind==='video');if(s)s.replaceTrack(track);}
      document.getElementById('lvid').srcObject=scrStream;
      sharing=true;document.getElementById('scrbtn').classList.add('sharing');
      track.onended=()=>togScreen();
    }catch(e){if(e.name!=='NotAllowedError')toast('Ошибка демонстрации экрана');}
  } else {
    if(scrStream){scrStream.getTracks().forEach(t=>t.stop());scrStream=null;}
    if(lStream&&curCall?.peerConnection){const ct=lStream.getVideoTracks()[0];if(ct){const s=curCall.peerConnection.getSenders().find(s=>s.track?.kind==='video');if(s)s.replaceTrack(ct);}}
    if(lStream)document.getElementById('lvid').srcObject=lStream;
    sharing=false;document.getElementById('scrbtn').classList.remove('sharing');
  }
}

// ── SOUNDS ────────────────────────────────────────────────────────────────────
function playPing(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(880,c.currentTime);o.frequency.setValueAtTime(1100,c.currentTime+0.07);g.gain.setValueAtTime(0.12,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.start();o.stop(c.currentTime+0.2);}catch(e){}}
function playRing(){stopRing();ringCtx=new(window.AudioContext||window.webkitAudioContext)();function b(){const o=ringCtx.createOscillator(),g=ringCtx.createGain();o.connect(g);g.connect(ringCtx.destination);o.frequency.setValueAtTime(880,ringCtx.currentTime);o.frequency.setValueAtTime(660,ringCtx.currentTime+0.15);g.gain.setValueAtTime(0.25,ringCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ringCtx.currentTime+0.45);o.start();o.stop(ringCtx.currentTime+0.5);}b();ringInt=setInterval(b,1200);setTimeout(stopRing,30000);}
function stopRing(){if(ringInt){clearInterval(ringInt);ringInt=null;}if(ringCtx){try{ringCtx.close();}catch(e){}ringCtx=null;}}
function showNotif(name,txt){if(document.hasFocus())return;if(Notification.permission==='granted')new Notification('WAVE — '+name,{body:txt});}

function logout(){
  if(!confirm('Выйти?'))return;
  const token=localStorage.getItem('w_token');
  if(token)fetch('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
  localStorage.removeItem('w_token');
  if(sock)sock.disconnect();if(peer)try{peer.destroy();}catch(e){}
  location.reload();
}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000);}

document.getElementById('ln').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lp').focus();});
document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('rn').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('rp').focus();});
document.getElementById('rp').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
document.getElementById('minp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
document.getElementById('minp').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';
  if(chat&&!chat.isFav&&sock){
    const toId=chat.isGroup?null:chat.id;
    const groupId=chat.isGroup?chat.id:null;
    sock.emit('typing',{toId,groupId,typing:true});
    clearTimeout(typTimer);typTimer=setTimeout(()=>sock.emit('typing',{toId,groupId,typing:false}),1500);
  }
});
document.getElementById('addinp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('addok').disabled)confirmAdd();if(e.key==='Escape')hideAdd();});
[...document.querySelectorAll('.mo')].forEach(mo=>{mo.addEventListener('click',e=>{if(e.target===mo)mo.classList.remove('on');});});

(async function(){

  }
