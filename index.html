<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WAVE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--s:#111118;--s2:#1a1a24;--s3:#22222e;--br:rgba(255,255,255,.07);--ac:#7fffb2;--ac2:#4fc3f7;--dn:#ff5252;--tx:#f0f0f8;--mt:rgba(240,240,248,.45);--mbg:rgba(127,255,178,.13);--mbd:rgba(127,255,178,.18)}
[data-theme=ocean]{--bg:#060e18;--s:#0d1b2a;--s2:#122233;--s3:#1a2f42;--ac:#4fc3f7;--ac2:#7fffb2;--mbg:rgba(79,195,247,.13);--mbd:rgba(79,195,247,.18)}
[data-theme=rose]{--bg:#120a0f;--s:#1e1118;--s2:#2a1622;--s3:#361b2c;--ac:#ff6496;--ac2:#ffb347;--mbg:rgba(255,100,150,.13);--mbd:rgba(255,100,150,.18)}
[data-theme=void]{--bg:#050507;--s:#0c0c10;--s2:#141418;--s3:#1c1c22;--ac:#a78bfa;--ac2:#60a5fa;--mbg:rgba(167,139,250,.13);--mbd:rgba(167,139,250,.18)}
[data-theme=amber]{--bg:#0f0a00;--s:#181200;--s2:#221a00;--s3:#2e2300;--ac:#fbbf24;--ac2:#f87171;--mbg:rgba(251,191,36,.13);--mbd:rgba(251,191,36,.18)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;display:flex}

/* ── LOGIN ── */
#ls{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);overflow-y:auto;padding:20px}
.lbox{width:100%;max-width:360px}
.llogo{text-align:center;margin-bottom:24px}
.llogo h1{font-size:48px;font-weight:800;letter-spacing:-3px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.llogo p{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);letter-spacing:4px;text-transform:uppercase;margin-top:2px}
.lcard{background:var(--s);border:1px solid var(--br);border-radius:20px;padding:22px;position:relative}
.lcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(127,255,178,.4),transparent)}
.tabs{display:flex;margin-bottom:18px;background:var(--s2);border-radius:10px;padding:3px}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--mt);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .2s}
.tab.on{background:var(--s3);color:var(--tx)}
.lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mt);margin-bottom:7px;display:block}
.inp{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:11px 14px;color:var(--tx);font-family:'Syne',sans-serif;font-size:15px;font-weight:600;outline:none;transition:border-color .2s;margin-bottom:11px}
.inp:focus{border-color:rgba(127,255,178,.5)}.inp::placeholder{color:var(--mt);font-weight:400;font-size:13px}
.avwrap{display:flex;justify-content:center;margin-bottom:16px}
.avc{width:80px;height:80px;border-radius:50%;border:2px dashed rgba(127,255,178,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--s2);position:relative;overflow:hidden;transition:all .2s}
.avc:hover{border-color:var(--ac)}.avc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.avc .ic{font-size:22px}.avc .sm{font-family:'DM Mono',monospace;font-size:9px;color:var(--mt);margin-top:3px}
.lbtn{width:100%;padding:12px;background:linear-gradient(135deg,rgba(127,255,178,.2),rgba(79,195,247,.2));border:1px solid rgba(127,255,178,.35);border-radius:10px;color:var(--ac);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.lbtn:hover{background:linear-gradient(135deg,rgba(127,255,178,.3),rgba(79,195,247,.3))}
.lerr{font-family:'DM Mono',monospace;font-size:11px;color:var(--dn);text-align:center;margin-top:8px;display:none}.lerr.show{display:block}

/* ── APP ── */
#app{display:none;width:100%;height:100vh;overflow:hidden}#app.on{display:flex}

/* ── SIDEBAR ── */
.sb{width:300px;min-width:300px;height:100%;background:var(--s);border-right:1px solid var(--br);display:flex;flex-direction:column;z-index:20;transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sbh{padding:10px 8px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:5px;flex-shrink:0}
.mav{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;cursor:pointer;overflow:hidden}
.avimg{width:100%;height:100%;object-fit:cover;border-radius:50%}
.minfo{flex:1;min-width:0}
.mname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mun{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ibtn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--br);color:var(--mt);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ibtn:hover{background:var(--s2);color:var(--tx)}
.sbsearch{padding:7px 9px;border-bottom:1px solid var(--br);flex-shrink:0}
.sbsearch input{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:7px 11px;color:var(--tx);font-family:'Syne',sans-serif;font-size:13px;outline:none}
.sbsearch input:focus{border-color:rgba(127,255,178,.3)}.sbsearch input::placeholder{color:var(--mt);font-size:12px}
.clist{flex:1;overflow-y:auto;padding:4px 0}
.clist::-webkit-scrollbar{width:3px}.clist::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.sb-sec{padding:4px 13px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mt);margin-top:3px}
.ci{padding:8px 11px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s}
.ci:hover{background:var(--s2)}.ci.act{background:rgba(127,255,178,.07);border-right:2px solid var(--ac)}.ci.blk{opacity:.4}
.cav{width:38px;height:38px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;position:relative;overflow:hidden}
.od{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:#555;border:2px solid var(--s)}.od.on{background:#4caf50}
.cinfo{flex:1;min-width:0}.cname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cprev{font-size:11px;color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;font-family:'DM Mono',monospace}
.cmeta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.ctime{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt)}
.ubadge{background:var(--ac);color:#000;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace}
.noc{padding:30px 18px;text-align:center;color:var(--mt);font-family:'DM Mono',monospace;font-size:11px;line-height:2.2}
.addbtn{margin:8px;padding:9px;background:rgba(127,255,178,.07);border:1px dashed rgba(127,255,178,.2);border-radius:10px;color:var(--ac);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;flex-shrink:0}
.addbtn:hover{background:rgba(127,255,178,.13)}

/* ── CHAT ── */
.ca{flex:1;height:100%;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mt)}
.empty .big{font-size:40px}.empty p{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px}
.chh{padding:10px 12px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:9px;background:var(--s);flex-shrink:0}
.chh .cav{width:34px;height:34px;font-size:15px;cursor:pointer}.chh .cav:hover{opacity:.8}
.chhi{flex:1;cursor:pointer;min-width:0}
.chhn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chhs{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);margin-top:1px}
.cbtns{display:flex;gap:5px;flex-shrink:0}
.cbtn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cbtn.vc{background:var(--s2);color:var(--tx)}.cbtn.vc:hover{background:var(--s3)}
.cbtn.vd{background:rgba(127,255,178,.12);color:var(--ac)}.cbtn.vd:hover{background:rgba(127,255,178,.22)}
.backbtn{display:none;width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:17px;background:var(--s2);color:var(--tx);align-items:center;justify-content:center;flex-shrink:0}

/* ── PIN ── */
#pinbar{display:none;padding:6px 12px;background:rgba(127,255,178,.06);border-bottom:1px solid rgba(127,255,178,.12);flex-direction:row;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
#pinbar.show{display:flex}#pinbar:hover{background:rgba(127,255,178,.1)}
.pintxt{flex:1;min-width:0}
.pintxt strong{color:var(--ac);font-size:9px;display:block;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
#pintxtval{font-size:11px;font-family:'DM Mono',monospace;color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.unpinbtn{background:none;border:none;color:var(--mt);cursor:pointer;font-size:15px;flex-shrink:0}.unpinbtn:hover{color:var(--dn)}

/* ── MESSAGES ── */
.ma{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:1px}
.ma::-webkit-scrollbar{width:3px}.ma::-webkit-scrollbar-thumb{background:var(--br);border-radius:2px}
.ddiv{text-align:center;margin:8px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);letter-spacing:1px;text-transform:uppercase}
.typi{font-family:'DM Mono',monospace;font-size:11px;color:var(--mt);padding:3px 0;display:none}.typi.show{display:block;animation:pk 1.5s infinite}
@keyframes pk{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes mIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes swr{0%{transform:translateX(0)}40%{transform:translateX(16px)}100%{transform:translateX(0)}}
.mw{display:flex;flex-direction:column;margin-bottom:4px}
.mw.mine,.mw.gm{align-items:flex-end}.mw.them,.mw.gt{align-items:flex-start}
.mb{max-width:72%;padding:8px 11px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;animation:mIn .18s ease;position:relative}
.mine .mb,.gm .mb{background:var(--mbg);border:1px solid var(--mbd);border-bottom-right-radius:3px}
.them .mb,.gt .mb{background:var(--s2);border:1px solid var(--br);border-bottom-left-radius:3px}
.mb.del{opacity:.4;font-style:italic;font-size:12px;color:var(--mt)}
.mb.pglow{box-shadow:0 0 0 2px var(--ac)!important}
.mw.swa .mb{animation:swr .3s ease}
.gsender{font-family:'DM Mono',monospace;font-size:10px;color:var(--ac2);margin-bottom:2px;padding-left:1px}
.fwdlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-bottom:3px;opacity:.7}
.mmeta{display:flex;align-items:center;gap:4px;margin-top:2px;padding:0 1px}
.mtime{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt)}
.mchk{font-size:10px;color:var(--mt)}.mchk.read{color:var(--ac)}
.rq{background:rgba(127,255,178,.07);border-left:2px solid var(--ac);border-radius:5px;padding:4px 8px;margin-bottom:4px;font-size:11px;color:var(--mt);font-family:'DM Mono',monospace;cursor:pointer;max-width:100%}
.rq strong{color:var(--ac2);display:block;font-size:9px;margin-bottom:1px;text-transform:uppercase;letter-spacing:1px}
.mreact{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.rpill{background:var(--s2);border:1px solid var(--br);border-radius:18px;padding:2px 8px;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;user-select:none;line-height:1.4}
.rpill:hover{background:var(--s3);transform:scale(1.08)}.rpill.me{border-color:var(--ac);background:rgba(127,255,178,.09)}
.rpill span{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt)}

/* ── CONTEXT ── */
.ctxm{position:fixed;background:var(--s);border:1px solid var(--br);border-radius:13px;padding:4px;z-index:300;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:mIn .15s ease}
.ctxi{padding:9px 13px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px;transition:background .1s}
.ctxi:hover{background:var(--s2)}.ctxi.dn{color:var(--dn)}
.rpkr{position:fixed;background:var(--s);border:1px solid var(--br);border-radius:14px;padding:8px 10px;display:flex;gap:4px;z-index:301;box-shadow:0 8px 32px rgba(0,0,0,.7)}
.rpkr button{background:none;border:none;font-size:22px;cursor:pointer;padding:2px 4px;border-radius:7px;transition:transform .1s;line-height:1}
.rpkr button:hover{transform:scale(1.4);background:var(--s2)}

/* ── MEDIA ── */
.msgimg{max-width:220px;max-height:170px;border-radius:10px;cursor:zoom-in;object-fit:cover;display:block;margin-top:2px}
.msgfile{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s3);border-radius:10px;cursor:pointer;transition:background .15s;margin-top:2px;min-width:160px}
.msgfile:hover{background:rgba(127,255,178,.1)}.mfi{font-size:20px;flex-shrink:0}
.mfname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.mfsize{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-top:1px}
.vmsg{display:flex;align-items:center;gap:8px;min-width:160px}
.vplay{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;background:rgba(127,255,178,.15);color:var(--ac);flex-shrink:0;transition:all .2s}
.vplay:hover{background:rgba(127,255,178,.25)}.vdur{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);flex-shrink:0}

/* ── REPLY / PREVIEW BARS ── */
#rbar{display:none;padding:7px 12px;background:var(--s2);border-top:1px solid var(--br);flex-direction:row;align-items:center;gap:8px;flex-shrink:0}
#rbar.show{display:flex}
#rbartxt{flex:1;font-size:11px;color:var(--mt);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#rbartxt strong{color:var(--ac2)}
.rcls{background:none;border:none;color:var(--mt);cursor:pointer;font-size:16px;line-height:1}.rcls:hover{color:var(--tx)}
#iprev{display:none;padding:7px 12px;background:var(--s2);border-top:1px solid var(--br);flex-direction:row;align-items:center;gap:9px;flex-shrink:0}
#iprev.show{display:flex}
#iprevthumb{width:50px;height:50px;border-radius:8px;object-fit:cover;border:1px solid var(--br);flex-shrink:0}
#iprevinfo{flex:1;min-width:0}.iprevname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iprevsize{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt);margin-top:1px}
.psbtn{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:600}
.psbtn.ok{background:var(--ac);color:#000}.psbtn.no{background:var(--s3);color:var(--tx)}

/* ── INPUT ── */
.cinpw{padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));border-top:1px solid var(--br);background:var(--s);flex-shrink:0}
.cinpr{display:flex;gap:6px;align-items:flex-end}
.attbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--br);background:var(--s2);color:var(--mt);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.attbtn:hover{background:var(--s3);color:var(--tx)}
.minp{flex:1;background:var(--s2);border:1px solid var(--br);border-radius:12px;padding:8px 12px;color:var(--tx);font-family:'Syne',sans-serif;font-size:14px;outline:none;resize:none;max-height:90px;line-height:1.5;transition:border-color .2s}
.minp:focus{border-color:rgba(127,255,178,.4)}.minp::placeholder{color:var(--mt)}
.sndbtn,.vrecbtn{width:36px;height:36px;border-radius:11px;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sndbtn{background:var(--ac);color:#000}.sndbtn:hover{transform:scale(1.06)}
.vrecbtn{background:var(--s2);border:1px solid var(--br);color:var(--mt)}.vrecbtn:hover{color:var(--tx)}
.vrecbtn.rec{background:rgba(255,82,82,.18);border-color:var(--dn);color:var(--dn);animation:pk 1s infinite}

/* ── MODALS ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.mo.on{display:flex}
.md{background:var(--s);border:1px solid var(--br);border-radius:18px;padding:20px;width:100%;max-width:340px;position:relative}
.md::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(127,255,178,.3),transparent);border-radius:18px 18px 0 0}
.mdt{font-size:15px;font-weight:700;margin-bottom:14px}
.mdinp{width:100%;background:var(--s2);border:1px solid var(--br);border-radius:9px;padding:9px 12px;color:var(--tx);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:8px}
.mdinp:focus{border-color:rgba(127,255,178,.4)}.mdinp::placeholder{color:var(--mt);font-size:12px}
.mdprev{background:var(--s2);border:1px solid var(--br);border-radius:9px;padding:9px 12px;margin-bottom:8px;display:none;align-items:center;gap:8px}
.mdprev.show{display:flex}
.mderr{font-family:'DM Mono',monospace;font-size:11px;color:var(--dn);margin-bottom:8px;display:none}.mderr.show{display:block}
.mdbtns{display:flex;gap:7px}
.mdb{flex:1;padding:9px;border-radius:9px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;transition:all .2s}
.mdb.p{background:var(--ac);color:#000}.mdb.p:hover{transform:translateY(-1px)}.mdb.p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.mdb.sec{background:var(--s2);border:1px solid var(--br);color:var(--tx)}.mdb.sec:hover{background:var(--s3)}
.mdb.danger{background:rgba(255,82,82,.15);border:1px solid rgba(255,82,82,.3);color:var(--dn)}.mdb.danger:hover{background:rgba(255,82,82,.25)}

/* ── PROFILE ── */
.profavw{display:flex;justify-content:center;margin-bottom:14px}
.profav{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;overflow:hidden;position:relative}
.profav::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;font-size:20px;border-radius:50%}.profav:hover::after{display:flex}
.cprofav{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;margin:0 auto 10px}
.cprofname{font-size:17px;font-weight:800;text-align:center;margin-bottom:3px}
.cprofun{font-family:'DM Mono',monospace;font-size:12px;color:var(--ac);text-align:center;margin-bottom:3px}
.cprofst{font-family:'DM Mono',monospace;font-size:11px;text-align:center;margin-bottom:12px}

/* ── THEMES ── */
.themes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.theme-btn{padding:10px;border-radius:10px;border:2px solid var(--br);background:var(--s2);cursor:pointer;text-align:center;transition:all .2s}
.theme-btn:hover{border-color:rgba(127,255,178,.3)}.theme-btn.active{border-color:var(--ac)}
.theme-dot{width:22px;height:22px;border-radius:50%;margin:0 auto 5px}
.theme-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--mt)}

/* ── FORWARD ── */
.fwdlist{max-height:220px;overflow-y:auto;margin-bottom:10px}
.fwditem{padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:8px;transition:background .15s}
.fwditem:hover{background:var(--s2)}.fwditem.sel{background:rgba(127,255,178,.1);border:1px solid rgba(127,255,178,.2)}
.fwdav{width:32px;height:32px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden;flex-shrink:0}
.fwdav img,.mpav img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── GROUP ── */
.mplist{max-height:200px;overflow-y:auto;margin-bottom:10px;border:1px solid var(--br);border-radius:9px}
.mpitem{padding:8px 11px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s;user-select:none}
.mpitem:hover{background:var(--s2)}.mpitem.sel{background:rgba(127,255,178,.08)}
.mpav{width:28px;height:28px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden;flex-shrink:0}
.mpchk{width:16px;height:16px;border-radius:4px;border:2px solid var(--br);margin-left:auto;flex-shrink:0;pointer-events:none;transition:all .15s}
.mpitem.sel .mpchk{background:var(--ac);border-color:var(--ac)}

/* ── LIGHTBOX ── */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:600;display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lb.on{display:flex}#lbimg{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px}

/* ── CALL ── */
#cs{display:none;position:fixed;inset:0;z-index:400;background:#000;flex-direction:column}
#cs.on{display:flex}
#vidwrap{flex:1;position:relative;display:none}#vidwrap.on{display:block}
#rvid{width:100%;height:100%;object-fit:cover;background:#050508}
#lvid{position:absolute;bottom:130px;right:14px;width:110px;height:148px;object-fit:cover;border-radius:12px;border:2px solid rgba(255,255,255,.25);box-shadow:0 6px 24px rgba(0,0,0,.8);z-index:2}
#voiceui{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px;background:var(--bg)}
#voiceui.on{display:flex}
.callav{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;position:relative}
.callav::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(127,255,178,.2);animation:rpl 2s ease-out infinite}
@keyframes rpl{0%{transform:scale(.9);opacity:1}100%{transform:scale(1.45);opacity:0}}
.calln{font-size:22px;font-weight:800}.callst{font-family:'DM Mono',monospace;font-size:12px;color:var(--mt)}
.wavea{display:flex;align-items:center;gap:3px;height:22px}
.wb{width:3px;border-radius:2px;background:var(--ac);animation:wa 1.2s ease-in-out infinite}
.wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.1s}.wb:nth-child(3){animation-delay:.2s}.wb:nth-child(4){animation-delay:.3s}.wb:nth-child(5){animation-delay:.2s}.wb:nth-child(6){animation-delay:.1s}.wb:nth-child(7){animation-delay:0s}
@keyframes wa{0%,100%{height:4px;opacity:.4}50%{height:18px;opacity:1}}
.cctrl{display:flex;justify-content:center;gap:12px;padding:16px 16px 28px;flex-wrap:wrap}
#vidwrap>.cctrl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.92),transparent)}
.ctrl{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:19px;gap:2px;transition:all .2s;background:rgba(255,255,255,.13);color:#fff;backdrop-filter:blur(10px)}
.ctrl small{font-size:8px;font-family:'DM Mono',monospace;opacity:.7;line-height:1}
.ctrl:hover{transform:scale(1.08)}.ctrl.on{background:rgba(127,255,178,.25);color:var(--ac)}
.ctrl.end{background:var(--dn);width:60px;height:60px;font-size:20px}.ctrl.end:hover{background:#ff2222}
.ctrl.scr.sharing{background:rgba(79,195,247,.25);color:var(--ac2)}

/* ── INCOMING ── */
#inc{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(24px);z-index:450;flex-direction:column;align-items:center;justify-content:center;gap:13px}
#inc.on{display:flex}
.inclbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--mt)}
.incav{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
.incname{font-size:25px;font-weight:800;color:var(--ac)}.inctype{font-family:'DM Mono',monospace;font-size:12px;color:var(--mt)}
.incbtns{display:flex;gap:24px;margin-top:6px}
.incbtn{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative}
.incbtn::after{content:'';position:absolute;inset:-7px;border-radius:50%;animation:rpl 1.4s ease-out infinite}
.inacc{background:#1db954;color:#fff}.inacc::after{border:2px solid #1db954}
.indec{background:var(--dn);color:#fff}.indec::after{border:2px solid var(--dn);animation-delay:.15s}
.incbtn:hover{transform:scale(1.08)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:8px 16px;font-family:'DM Mono',monospace;font-size:12px;z-index:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:88vw;pointer-events:none;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── MOBILE ── */
@media(max-width:640px){

}

<script>
// apply theme immediately before anything renders
(function(){const t=localStorage.getItem('w_theme');if(t&&t!=='default')document.body.setAttribute('data-theme',t);})();
// load PeerJS async
(function(){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js';document.head.appendChild(s);})();

const EMOJIS=['👍','❤️','😂','😮','😢','🔥','🎉','💯'];
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtSz=b=>b>1048576?(b/1048576).toFixed(1)+' MB':Math.round(b/1024)+' KB';
const fmtDur=s=>{const m=Math.floor(s/60),ss=s%60;return m+':'+String(ss).padStart(2,'0')};
const fmtT=ts=>{const d=new Date(ts*1000);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')};

let me=null,sock=null,peer=null;
let contacts=[],groups=[],chat=null;
let lStream=null,scrStream=null,curCall=null;
let isVid=false,muted=false,camOff=false,sharing=false,incData=null;
let typTimer=null,callTimer=null,callSecs=0;
let ringCtx=null,ringInt=null;
let foundU=null,replyTo=null,fwdMsg=null,fwdTarget=null;
let mrec=null,aChunks=[],recording=false;
let pendingF=null,newProfImg=null,regAvImg=null;
let blocked=new Set();   // кого Я заблокировал
let chatPin=null,srchRes=[];

// ── AVATAR CACHE ─────────────────────────────────────────────────────────────
const getAVs=()=>{try{return JSON.parse(localStorage.getItem('w_av')||'{}')}catch{return{}}};
function setAV(id,img){try{const a=getAVs();if(img)a[id]=img;else delete a[id];localStorage.setItem('w_av',JSON.stringify(a))}catch{}}
function renderAV(el,uid,emoji){
  const img=getAVs()[uid];
  if(img){el.innerHTML=`<img class="avimg" src="${img}">`;el.style.fontSize='';}

// ── BLOCKS ────────────────────────────────────────────────────────────────────
// blocked = список тех, кого Я заблокировал
// Логика: если Я заблокировал юзера — его сообщения не отображаю у себя,
//         его звонки не показываю. НО я сам могу ему писать (он получит отказ от сервера если заблокировал меня).
// Если ОН заблокировал МЕНЯ — сервер молча дропает моё сообщение/звонок.
async function loadBlocked(){
  try{const r=await fetch('/api/blocks/'+me.id);blocked=new Set(await r.json());}catch{}
}
const iBlocked=id=>blocked.has(id);

async function toggleBlock(){
  if(!chat||chat.isFav||chat.isGroup)return;
  const id=chat.id;
  if(iBlocked(id)){
    await fetch(`/api/blocks/${me.id}/${id}`,{method:'DELETE'});
    blocked.delete(id);toast('✅ Разблокировано');
  }else{
    await fetch('/api/blocks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ownerId:me.id,blockedId:id})});
    blocked.add(id);toast('🚫 Заблокировано');
  }
  document.getElementById('blockbtn').textContent=iBlocked(id)?'✅ Разблокировать':'🚫 Заблокировать';
  renderSB();
}

// ── SOCKET ────────────────────────────────────────────────────────────────────
function connectSock(){
  sock=io();
  sock.emit('join',{userId:me.id});

  sock.on('message',async msg=>{
    // кешируем бинарные данные
    if(msg.file_data){
      if(msg.type==='voice')window['_v'+msg.id]=msg.file_data;
      else if(msg.type==='file')window['_f'+msg.id]=msg.file_data;
      else if(msg.type==='image')window['_i'+msg.id]=msg.file_data;
    }
    // Если я заблокировал отправителя — не показываем сообщение
    if(msg.from_id!==me.id&&iBlocked(msg.from_id))return;

    const inCur=chat&&(
      (msg.group_id&&msg.group_id===chat.id)||
      (!msg.group_id&&!chat.isGroup&&!chat.isFav&&(msg.from_id===chat.id||msg.to_id===chat.id))
    );
    if(inCur){appendMsg(msg);sock.emit('read',{fromId:msg.from_id,groupId:msg.group_id||null});}

    if(msg.group_id){
      const g=groups.find(x=>x.id===msg.group_id);
      if(g){updGPrev(g,msg);if(!inCur&&msg.from_id!==me.id){g.unread=(g.unread||0)+1;playPing();showNotif(g.name,msg.text||'📎');}}
    }else{
      let c=contacts.find(x=>x.id===msg.from_id)||contacts.find(x=>x.id===msg.to_id);
      if(!c&&msg.from_id!==me.id){
        try{const r=await fetch('/api/user/'+msg.from_id);if(r.ok){const u=await r.json();if(u.avatar_img)setAV(u.id,u.avatar_img);c={...u,online:true,unread:0};contacts.unshift(c);}}catch{}
      }
      if(c){
        updCPrev(c,msg);
        if(!inCur&&msg.from_id!==me.id){c.unread=(c.unread||0)+1;playPing();
          showNotif(c.name,msg.forwarded?'↗️ переслано':msg.type==='voice'?'🎤':msg.type==='image'?'📷':msg.type==='file'?'📎':msg.text||'');}
      }
    }
    renderSB();
  });

  // НЕ обновляем свой статус — мы всегда знаем что мы онлайн
  sock.on('presence',({userId,online})=>{
    if(userId===me.id)return;
    const c=contacts.find(x=>x.id===userId);
    if(c){c.online=online;renderSB();if(chat?.id===userId&&!chat.isGroup&&!chat.isFav)setChatSt();}
  });

  sock.on('typing',({fromId,typing})=>{
    if(!chat||fromId===me.id)return;
    if(chat.isGroup||(fromId===chat.id))document.getElementById('typi').classList.toggle('show',typing);
  });
  sock.on('read',({byId})=>{
    if(chat&&!chat.isGroup&&!chat.isFav&&byId===chat.id)document.querySelectorAll('.mchk').forEach(e=>e.classList.add('read'));
  });
  sock.on('reaction-update',({msgId,reactions})=>{
    const el=document.querySelector(`.mreact[data-mid="${msgId}"]`);
    if(el)renderReacts(el,msgId,reactions);
  });
  sock.on('message-deleted',({msgId})=>{
    const el=document.querySelector(`.mw[data-id="${msgId}"] .mb`);
    if(el){el.classList.add('del');el.innerHTML='Сообщение удалено';}
  });
  sock.on('pin-update',({chatKey,msgId,text})=>{
    if(getCK()===chatKey){
      chatPin={msgId,text};showPinBar();
      document.querySelectorAll('.mb.pglow').forEach(e=>e.classList.remove('pglow'));
      document.querySelector(`.mw[data-id="${msgId}"] .mb`)?.classList.add('pglow');
    }
  });
  sock.on('unpin',({chatKey})=>{
    if(getCK()===chatKey){chatPin=null;hidePinBar();document.querySelectorAll('.mb.pglow').forEach(e=>e.classList.remove('pglow'));}
  });
  sock.on('user-updated',u=>{
    if(u.avatar_img)setAV(u.id,u.avatar_img);
    const c=contacts.find(x=>x.id===u.id);if(c){c.name=u.name;c.username=u.username;renderSB();}
    if(chat?.id===u.id&&!chat.isGroup&&!chat.isFav){document.getElementById('chname').textContent=u.name;renderAV(document.getElementById('chav'),u.id,u.avatar||'👤');}
  });
  sock.on('group-added',g=>{if(!groups.find(x=>x.id===g.id)){groups.unshift(g);renderSB();}});
  sock.on('call-invite',({from,callType,peerId})=>{
    if(iBlocked(from.id))return;
    incData={from,callType,peerId};if(from.avatar_img)setAV(from.id,from.avatar_img);
    renderAV(document.getElementById('incav'),from.id,from.avatar||'👤');
    document.getElementById('incname').textContent=from.name;
    document.getElementById('inctype').textContent=callType==='video'?'📹 видео':'🎙️ голосовой';
    openMo('inc');playRing();
  });
  sock.on('call-accept',({peerId})=>connectCall(peerId));
  sock.on('call-decline',()=>{toast('Звонок отклонён');cleanupCall();});
  sock.on('call-end',()=>cleanupCall());
}

function getCK(){if(!chat||chat.isFav)return null;if(chat.isGroup)return 'g:'+chat.id;return [me.id,chat.id].sort().join(':');}
function updCPrev(c,msg){const p=msg.forwarded?'↗️ переслано':msg.type==='voice'?'🎤 Голосовое':msg.type==='image'?'📷 Фото':msg.type==='file'?'📎 '+msg.file_name:msg.text||'';c._prev=(msg.from_id===me.id?'ты: ':'')+p;c._time=fmtT(msg.created_at);}
function updGPrev(g,msg){const sn=msg.from_id===me.id?'ты':(contacts.find(x=>x.id===msg.from_id)?.name||'?');g._prev=sn+': '+(msg.type==='voice'?'🎤':msg.type==='image'?'📷':msg.type==='file'?'📎':msg.text||'');g._time=fmtT(msg.created_at);}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSB(){
  const fl=(document.getElementById('sbsi').value||'').toLowerCase().replace(/^@/,'');

  const favRow=`<div class="ci${chat?.isFav?' act':''}" onclick="openFavorites()">

  const gHtml=gItems.length?`<div class="sb-sec">Группы</div>`+gItems.map(g=>`
    <div class="ci${chat?.id===g.id?' act':''}" onclick="openGrpChat('${g.id}')">

      <div class="cmeta">${g._time?`<div class="ctime">${g._time}</div>`:''}${g.unread?`<div class="ubadge">${g.unread}</div>`:''}</div>
    </div>`).join(''):'';

  const cItems=fl?contacts.filter(c=>(c.username||'').includes(fl)||c.name.toLowerCase().includes(fl)):contacts;
  const cHtml=cItems.length?`<div class="sb-sec">Контакты</div>`+cItems.map(c=>{
    const blk=iBlocked(c.id);
    return `<div class="ci${chat?.id===c.id?' act':''}${blk?' blk':''}" onclick="openChat('${c.id}')">
      <div class="cav">${avH(c.id,c.avatar||'👤')}<div class="od${c.online&&!blk?' on':''}"></div></div>
      <div class="cinfo"><div class="cname">${esc(c.name)}${blk?' 🚫':''}</div><div class="cprev">${esc(c._prev||(c.username?'@'+c.username:''))}</div></div>
      <div class="cmeta">${c._time?`<div class="ctime">${c._time}</div>`:''}${c.unread&&!blk?`<div class="ubadge">${c.unread}</div>`:''}</div>
    </div>`;
  }).join(''):`<div class="noc">${fl?'Не найдено':'Контактов нет.<br>Нажми ＋ чтобы добавить.'}</div>`;

  const srHtml=fl&&srchRes.length?`<div class="sb-sec">Найдено в сети</div>`+
    srchRes.filter(u=>u.id!==me.id&&!contacts.find(c=>c.id===u.id)).map(u=>
    `<div class="ci" onclick="quickAdd('${u.id}')">
      <div class="cav">${avH(u.id,u.avatar||'👤')}</div>
      <div class="cinfo"><div class="cname">${esc(u.name)} <span style="color:var(--ac)">＋</span></div><div class="cprev">${u.username?'@'+esc(u.username):''}</div></div>
    </div>`).join(''):'';

  list.innerHTML=favRow+gHtml+cHtml+srHtml;
}

// ── RENDER MESSAGES ───────────────────────────────────────────────────────────
function renderMsgs(msgs){
  const area=document.getElementById('ma');area.innerHTML='<div class="typi" id="typi">печатает...</div>';
  msgs.forEach(m=>{
    if(m.file_data){
      if(m.type==='voice')window['_v'+m.id]=m.file_data;
      else if(m.type==='file')window['_f'+m.id]=m.file_data;
      else if(m.type==='image')window['_i'+m.id]=m.file_data;
    }
  });
  let lastD=null;
  msgs.forEach(m=>{
    const ds=new Date(m.created_at*1000).toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
    if(ds!==lastD){lastD=ds;const div=document.createElement('div');div.className='ddiv';div.textContent=ds;area.appendChild(div);}
    appendMsg(m,false);
  });
  area.scrollTop=area.scrollHeight;document.getElementById('minp').focus();
}

// ── APPEND MSG ────────────────────────────────────────────────────────────────
function appendMsg(msg,scroll=true){
  const area=document.getElementById('ma');
  const mine=msg.from_id===me.id;
  const reacts=typeof msg.reactions==='string'?JSON.parse(msg.reactions||'{}'):(msg.reactions||{});
  const wrap=document.createElement('div');
  wrap.dataset.id=msg.id;wrap.dataset.from=msg.from_id;
  wrap.className='mw '+(chat?.isGroup?(mine?'gm':'gt'):(mine?'mine':'them'));

  let sH='';
  if(chat?.isGroup&&!mine){const m=chat.members?.find(x=>x.id===msg.from_id);sH=`<div class="gsender">${esc(m?.name||msg.from_id)}</div>`;}

  // forwarded — показываем всегда если forwarded=1 (оба участника видят)
  const fH=(msg.forwarded==1||msg.forwarded===true)?`<div class="fwdlbl">↗️ переслано</div>`:'';

  let rqH='';
  if(msg.reply_to){
    const rb=document.querySelector(`.mw[data-id="${msg.reply_to}"] .mb`);
    let refTxt='...';
    if(rb&&!rb.classList.contains('del')){const cl=rb.cloneNode(true);cl.querySelectorAll('img,svg,button,.fwdlbl,.gsender').forEach(el=>el.remove());refTxt=cl.textContent.trim().replace(/\s+/g,' ').slice(0,80)||(rb.querySelector('img')?'📷':rb.querySelector('.vmsg')?'🎤':'📎');}
    rqH=`<div class="rq" onclick="scrollToMsg('${msg.reply_to}')"><strong>↩ ответ</strong>${esc(refTxt)}</div>`;
  }

  let cnt='';
  if(msg.deleted){cnt='<div class="mb del">Сообщение удалено</div>';}
  else if(msg.type==='image'){const src=msg.file_data||window['_i'+msg.id]||'';cnt=`<div class="mb" style="padding:5px"><img class="msgimg" src="${src}"/></div>`;}
  else if(msg.type==='file'){cnt=`<div class="mb"><div class="msgfile" onclick="dlFile('${msg.id}','${esc(msg.file_name||'file')}')"><div class="mfi">📎</div><div><div class="mfname">${esc(msg.file_name||'файл')}</div><div class="mfsize">${msg.file_size?fmtSz(msg.file_size):''}</div></div></div></div>`;}
  else if(msg.type==='voice'){cnt=`<div class="mb"><div class="vmsg"><button class="vplay" id="vp${msg.id}" onclick="playVoice('${msg.id}')">▶</button><div style="flex:1">${wSVG()}</div><span class="vdur">${msg.file_size?fmtDur(Math.round(msg.file_size/16)):''}</span></div></div>`;}
  else{cnt=`<div class="mb">${esc(msg.text||'').replace(/\n/g,'<br>')}</div>`;}

  wrap.innerHTML=sH+fH+rqH+cnt+`<div class="mreact" data-mid="${msg.id}"></div><div class="mmeta"><span class="mtime">${fmtT(msg.created_at)}</span>${mine&&!chat?.isGroup&&!chat?.isFav?`<span class="mchk${msg.read?' read':''}">✓✓</span>`:''}</div>`;

  if(Object.keys(reacts).length){const el=wrap.querySelector('.mreact');if(el)renderReacts(el,msg.id,reacts);}
  if(chatPin?.msgId===msg.id)wrap.querySelector('.mb')?.classList.add('pglow');

  if(!msg.deleted){
    const bub=wrap.querySelector('.mb');
    if(bub){
      bub.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e,msg,mine);});
      bub.addEventListener('dblclick',e=>{e.preventDefault();setReply(msg);wrap.classList.add('swa');setTimeout(()=>wrap.classList.remove('swa'),300);});
      let pt;
      bub.addEventListener('touchstart',e=>{pt=setTimeout(()=>showCtx(e.touches[0],msg,mine),500);},{passive:true});
      bub.addEventListener('touchend',()=>clearTimeout(pt));bub.addEventListener('touchmove',()=>clearTimeout(pt));
    }
  }
  if(msg.type==='image'&&!msg.deleted){
    wrap.querySelector('.mb')?.addEventListener('click',()=>{const s=window['_i'+msg.id]||wrap.querySelector('img')?.src||'';if(s)openLB(s);});
  }
  area.insertBefore(wrap,document.getElementById('typi'));
  if(scroll)area.scrollTop=area.scrollHeight;
}

  }else{

function handleFile(e){
  const f=e.target.files[0];if(!f||!chat)return;if(f.size>10485760){toast('Макс. 10MB');e.target.value='';return;}
  const r=new FileReader();r.onload=ev=>{
    const isImg=f.type.startsWith('image/');pendingF={file:f,data:ev.target.result,type:isImg?'image':'file'};
    if(isImg){document.getElementById('iprevthumb').src=ev.target.result;document.getElementById('iprevname').textContent=f.name;document.getElementById('iprevsize').textContent=fmtSz(f.size);document.getElementById('iprev').classList.add('show');}
    else sendPending();
  };r.readAsDataURL(f);e.target.value='';
}
function sendPending(){
  if(!pendingF||!chat)return;if(chat.isFav){toast('Файлы в Избранное не поддерживаются');cancelPrev();return;}
  sock.emit('message',{toId:chat.isGroup?null:chat.id,groupId:chat.isGroup?chat.id:null,type:pendingF.type,fileName:pendingF.file.name,fileSize:pendingF.file.size,fileData:pendingF.data,replyTo:replyTo?.id||null});

}

async function toggleVoice(){
  if(!recording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mrec=new MediaRecorder(stream);aChunks=[];
      mrec.ondataavailable=e=>aChunks.push(e.data);
      mrec.onstop=()=>{
        const blob=new Blob(aChunks,{type:'audio/webm'});
        const r=new FileReader();
        r.onload=ev=>{sock.emit('message',{toId:chat.isGroup?null:chat.id,groupId:chat.isGroup?chat.id:null,type:'voice',fileName:'voice.webm',fileSize:Math.round(blob.size/1000),fileData:ev.target.result});};
        r.readAsDataURL(blob);stream.getTracks().forEach(t=>t.stop());
      };
      mrec.start();recording=true;document.getElementById('vrecbtn').classList.add('rec');
    }catch{toast('Нет доступа к микрофону');}
  }else{mrec.stop();recording=false;document.getElementById('vrecbtn').classList.remove('rec');}
}
function playVoice(id){
  const data=window['_v'+id];if(!data){toast('Аудио недоступно');return;}
  const audio=new Audio(data);const btn=document.getElementById('vp'+id);if(!btn)return;
  btn.textContent='⏸';audio.play().catch(()=>toast('Ошибка воспроизведения'));
  audio.onended=()=>{if(btn)btn.textContent='▶';};
  btn.onclick=()=>{audio.pause();if(btn){btn.textContent='▶';btn.onclick=()=>playVoice(id);}};
}

// ── CALLS ─────────────────────────────────────────────────────────────────────
async function callC(video){
  if(!chat||chat.isGroup||chat.isFav)return;
  isVid=video;
  try{
    lStream=await navigator.mediaDevices.getUserMedia({
      audio:true,
      video:video?{width:1280,height:720,facingMode:'user'}:false
    });
  }catch(e){toast('Нет доступа к '+(video?'камере':'микрофону'));return;}
  showCallUI(chat,true);
  sock.emit('call-invite',{toId:chat.id,callType:video?'video':'voice',peerId:peer.id});
}

// Вызывающий получает peerId собеседника и инициирует peer.call
function connectCall(remotePeerId){
  if(!lStream||!peer)return;
  const call=peer.call(remotePeerId,lStream);
  curCall=call;
  call.on('stream',s=>onRemoteStream(s));
  call.on('close',()=>cleanupCall());
  call.on('error',e=>{console.warn('call err',e);cleanupCall();});
}

// Принимающий: получает медиа → отвечает своим стримом → слушает стрим собеседника
async function acceptCall(){
  stopRing();
  document.getElementById('inc').classList.remove('on');
  const saved=incData;  // сохраняем до async
  incData=null;
  if(!saved)return;
  isVid=saved.callType==='video';
  try{
    lStream=await navigator.mediaDevices.getUserMedia({
      audio:true,
      video:isVid?{width:1280,height:720,facingMode:'user'}:false
    });
  }catch(e){
    toast('Нет доступа к '+(isVid?'камере':'микрофону'));
    sock.emit('call-decline',{toId:saved.from.id});
    return;
  }
  const caller=contacts.find(c=>c.id===saved.from.id)||saved.from;
  showCallUI(caller,false);
  // Слушаем входящий peer.call от звонящего
  peer.once('call',call=>{
    call.answer(lStream);   // отдаём ему наш стрим — он нас услышит/увидит
    curCall=call;
    call.on('stream',s=>onRemoteStream(s));   // его стрим — мы слышим/видим его
    call.on('close',()=>cleanupCall());
    call.on('error',()=>cleanupCall());
  });
  // Сообщаем звонящему свой peerId чтобы он вызвал нас через peer.call
  sock.emit('call-accept',{toId:saved.from.id,peerId:peer.id});
}
function declineCall(){
  stopRing();
  document.getElementById('inc').classList.remove('on');
  if(incData){sock.emit('call-decline',{toId:incData.from.id});incData=null;}
}
function showCallUI(contact,outgoing){
  document.getElementById('cs').classList.add('on');
  renderAV(document.getElementById('callav'),contact.id,contact.avatar||'👤');
  document.getElementById('calln').textContent=contact.name||'...';
  document.getElementById('callst').textContent=outgoing?'Звоним...':'Входящий...';
  // показываем нужный layout
  document.getElementById('vidwrap').classList.toggle('on',isVid);
  document.getElementById('voiceui').classList.toggle('on',!isVid);
  if(isVid&&lStream)document.getElementById('lvid').srcObject=lStream;
  muted=false;camOff=false;sharing=false;
  resetCtrlBtns();
}
function resetCtrlBtns(){
  ['vMute','aMute'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('on');el.innerHTML='🎙️<small>звук</small>';}});
  const vc=document.getElementById('vCam');if(vc){vc.classList.remove('on');vc.innerHTML='📹<small>камера</small>';}
  const vs=document.getElementById('vScr'),as=document.getElementById('aScr');
  if(vs){vs.classList.remove('sharing');vs.innerHTML='🖥️<small>экран</small>';}
  if(as){as.classList.remove('sharing');as.innerHTML='🖥️<small>экран</small>';}
}
function onRemoteStream(stream){
  document.getElementById('callst').textContent='00:00';
  clearInterval(callTimer);callSecs=0;
  callTimer=setInterval(()=>{callSecs++;const m=String(Math.floor(callSecs/60)).padStart(2,'0'),s=String(callSecs%60).padStart(2,'0');document.getElementById('callst').textContent=m+':'+s;},1000);
  if(isVid){document.getElementById('rvid').srcObject=stream;}
  else{try{const a=new Audio();a.srcObject=stream;a.play();}catch{}}
}
function endCall(){const toId=chat?.id||incData?.from?.id;if(toId)sock.emit('call-end',{toId});cleanupCall();}
function cleanupCall(){
  stopRing();clearInterval(callTimer);callTimer=null;callSecs=0;
  if(lStream){lStream.getTracks().forEach(t=>t.stop());lStream=null;}
  if(scrStream){scrStream.getTracks().forEach(t=>t.stop());scrStream=null;}
  if(curCall){try{curCall.close();}catch{}curCall=null;}
  incData=null;muted=false;camOff=false;sharing=false;
  document.getElementById('cs').classList.remove('on');
  document.getElementById('vidwrap').classList.remove('on');
  document.getElementById('voiceui').classList.remove('on');
  document.getElementById('rvid').srcObject=null;
  document.getElementById('lvid').srcObject=null;
}
function togMute(){
  if(!lStream)return;muted=!muted;lStream.getAudioTracks().forEach(t=>t.enabled=!muted);
  const ic=muted?'🔇':'🎙️';
  ['vMute','aMute'].forEach(id=>{const el=document.getElementById(id);if(el){el.innerHTML=ic+'<small>звук</small>';el.classList.toggle('on',muted);}});
}
function togCam(){
  if(!lStream)return;camOff=!camOff;lStream.getVideoTracks().forEach(t=>t.enabled=!camOff);
  const el=document.getElementById('vCam');if(el){el.innerHTML=(camOff?'🚫':'📹')+'<small>камера</small>';el.classList.toggle('on',camOff);}
}
async function togScreen(){
  if(!sharing){
    try{
      scrStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:false});
      const track=scrStream.getVideoTracks()[0];
      if(curCall?.peerConnection){
        const sender=curCall.peerConnection.getSenders().find(s=>s.track?.kind==='video');
        if(sender)await sender.replaceTrack(track);
      }
      if(isVid)document.getElementById('lvid').srcObject=scrStream;
      sharing=true;
      ['vScr','aScr'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.add('sharing');el.innerHTML='🖥️<small>показываю</small>';}});
      track.onended=()=>togScreen();
    }catch(e){
      console.warn('screen share',e);
      if(e.name!=='NotAllowedError')toast('Ошибка демонстрации экрана: '+e.message);
    }
  }else{
    if(scrStream){scrStream.getTracks().forEach(t=>t.stop());scrStream=null;}
    if(isVid&&lStream&&curCall?.peerConnection){
      const camTrack=lStream.getVideoTracks()[0];
      if(camTrack){const s=curCall.peerConnection.getSenders().find(s=>s.track?.kind==='video');if(s)s.replaceTrack(camTrack);}
    }
    if(isVid&&lStream)document.getElementById('lvid').srcObject=lStream;
    sharing=false;
    ['vScr','aScr'].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('sharing');el.innerHTML='🖥️<small>экран</small>';}});
  }
}

// ── SOUNDS ────────────────────────────────────────────────────────────────────
function playPing(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(0.09,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);o.start();o.stop(c.currentTime+0.2);}catch{}}
function playRing(){stopRing();try{ringCtx=new(window.AudioContext||window.webkitAudioContext)();function b(){const o=ringCtx.createOscillator(),g=ringCtx.createGain();o.connect(g);g.connect(ringCtx.destination);o.frequency.setValueAtTime(880,ringCtx.currentTime);o.frequency.setValueAtTime(660,ringCtx.currentTime+0.15);g.gain.setValueAtTime(0.18,ringCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ringCtx.currentTime+0.45);o.start();o.stop(ringCtx.currentTime+0.5);}b();ringInt=setInterval(b,1200);setTimeout(stopRing,30000);}catch{}}
function stopRing(){if(ringInt){clearInterval(ringInt);ringInt=null;}if(ringCtx){try{ringCtx.close();}catch{}ringCtx=null;}}
function showNotif(name,txt){if(document.hasFocus())return;if(Notification.permission==='granted')new Notification('WAVE — '+name,{body:txt});}

function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000);}
function logout(){
  if(!confirm('Выйти?'))return;
  const token=localStorage.getItem('w_token');
  if(token)fetch('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})}).catch(()=>{});
  localStorage.removeItem('w_token');
  if(sock)sock.disconnect();if(peer)try{peer.destroy();}catch{}
  location.reload();
}

  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';
