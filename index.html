<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVE — Звонки</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
    --border: rgba(255,255,255,0.08); --accent: #7fffb2; --accent2: #4fc3f7;
    --danger: #ff5252; --text: #f0f0f8; --muted: rgba(240,240,248,0.4);
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(127,255,178,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 50% 60% at 80% 80%, rgba(79,195,247,0.04) 0%, transparent 60%);
    pointer-events: none; animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse { from { opacity: 0.6; } to { opacity: 1; } }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none;
  }
  .app { position: relative; z-index: 10; width: 100%; max-width: 480px; padding: 24px; max-height: 100vh; overflow-y: auto; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo h1 {
    font-size: 42px; font-weight: 800; letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 14px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(127,255,178,0.3), transparent); }
  .card-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .name-row { display: flex; gap: 10px; align-items: center; }
  .name-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px;
    font-weight: 600; outline: none; transition: border-color 0.2s;
  }
  .name-input::placeholder { color: var(--muted); font-weight: 400; font-size: 13px; }
  .name-input:focus { border-color: rgba(127,255,178,0.4); }
  .my-id-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 10px; }
  .my-id-value { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; color: var(--accent); letter-spacing: 2px; flex: 1; }
  .copy-btn { background: rgba(127,255,178,0.1); border: 1px solid rgba(127,255,178,0.2); color: var(--accent); padding: 6px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .copy-btn:hover { background: rgba(127,255,178,0.2); }
  .copy-btn.copied { color: #fff; border-color: var(--accent); background: var(--accent); }
  .id-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 18px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px; letter-spacing: 2px; outline: none; transition: border-color 0.2s; }
  .id-input::placeholder { color: var(--muted); letter-spacing: 1px; font-size: 13px; }
  .id-input:focus { border-color: rgba(127,255,178,0.4); }
  .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .call-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { padding: 13px 10px; border-radius: 12px; border: none; cursor: pointer; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; position: relative; overflow: hidden; }
  .btn::after { content: ''; position: absolute; inset: 0; background: white; opacity: 0; transition: opacity 0.15s; }
  .btn:active::after { opacity: 0.08; }
  .btn-voice { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
  .btn-voice:hover { border-color: rgba(255,255,255,0.2); background: #222230; }
  .btn-video { background: linear-gradient(135deg, rgba(127,255,178,0.2), rgba(79,195,247,0.2)); border: 1px solid rgba(127,255,178,0.3); color: var(--accent); }
  .btn-video:hover { background: linear-gradient(135deg, rgba(127,255,178,0.3), rgba(79,195,247,0.3)); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface2); border-radius: 10px; margin-top: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  .status-dot.calling { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 0.8s infinite; }
  .status-dot.error { background: var(--danger); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-text { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  /* CALL SCREEN */
  #call-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
  #call-screen.active { display: flex; }
  .video-container { position: relative; width: 100%; height: 100%; background: #050508; }
  #remote-video { width: 100%; height: 100%; object-fit: cover; }
  #local-video { position: absolute; bottom: 100px; right: 20px; width: 120px; height: 160px; object-fit: cover; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  .voice-call-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; padding: 40px; width: 100%; }
  .caller-avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 8px; position: relative; }
  .caller-avatar::after { content: ''; position: absolute; inset: -8px; border-radius: 50%; border: 2px solid rgba(127,255,178,0.3); animation: ringPulse 2s ease-out infinite; }
  @keyframes ringPulse { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
  .caller-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .call-timer { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--muted); }
  .sound-wave { display: flex; align-items: center; gap: 3px; height: 30px; }
  .wave-bar { width: 3px; border-radius: 2px; background: var(--accent); animation: waveAnim 1.2s ease-in-out infinite; }
  .wave-bar:nth-child(1) { animation-delay: 0s; } .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; } .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.2s; } .wave-bar:nth-child(6) { animation-delay: 0.1s; }
  .wave-bar:nth-child(7) { animation-delay: 0s; }
  @keyframes waveAnim { 0%, 100% { height: 4px; opacity: 0.4; } 50% { height: 24px; opacity: 1; } }
  .call-controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 32px 32px; display: flex; justify-content: center; gap: 14px; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); }
  .ctrl-btn { width: 54px; height: 54px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; background: rgba(255,255,255,0.1); color: white; backdrop-filter: blur(10px); position: relative; }
  .ctrl-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.15); }
  .ctrl-btn.active { background: rgba(127,255,178,0.2); color: var(--accent); }
  .ctrl-btn.end { background: var(--danger); width: 62px; height: 62px; font-size: 22px; }
  .ctrl-btn.end:hover { background: #ff3333; transform: scale(1.05); }
  .chat-unread { position: absolute; top: -2px; right: -2px; width: 18px; height: 18px; background: var(--accent); border-radius: 50%; font-size: 9px; font-weight: 700; color: #000; display: none; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; }
  .chat-unread.show { display: flex; }

  /* CHAT PANEL */
  #chat-panel { position: absolute; right: 0; top: 0; bottom: 0; width: min(300px, 85vw); background: rgba(10,10,15,0.97); backdrop-filter: blur(20px); border-left: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index: 10; }
  #chat-panel.open { transform: translateX(0); }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .chat-header span { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .chat-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; line-height: 1; }
  .chat-close:hover { color: var(--text); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; animation: msgIn 0.2s ease; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg.mine { background: rgba(127,255,178,0.15); border: 1px solid rgba(127,255,178,0.2); align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.theirs { background: var(--surface2); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg-name { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent); margin-bottom: 3px; }
  .msg-time { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-top: 4px; text-align: right; }
  .chat-input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; outline: none; resize: none; transition: border-color 0.2s; max-height: 80px; line-height: 1.4; }
  .chat-input:focus { border-color: rgba(127,255,178,0.4); }
  .chat-send { width: 38px; height: 38px; border-radius: 10px; border: none; cursor: pointer; background: var(--accent); color: #000; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .chat-send:hover { transform: scale(1.05); }

  /* INCOMING */
  #incoming-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  #incoming-screen.active { display: flex; }
  .incoming-title { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }
  .incoming-id { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }
  .incoming-type { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .incoming-btns { display: flex; gap: 24px; margin-top: 12px; }
  .answer-btn { width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative; }
  .answer-btn::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; animation: ringPulse 1.5s ease-out infinite; }
  .answer-accept { background: #1db954; color: white; }
  .answer-accept::after { border: 2px solid #1db954; }
  .answer-decline { background: var(--danger); color: white; }
  .answer-decline::after { border: 2px solid var(--danger); animation-delay: 0.2s; }
  .answer-btn:hover { transform: scale(1.1); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); z-index: 300; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .conn-badge { position: fixed; top: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; z-index: 50; }
  .no-signal { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px; background: rgba(255,82,82,0.08); border: 1px solid rgba(255,82,82,0.2); border-radius: 12px; margin-top: 12px; }
  .no-signal p { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,82,82,0.8); text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div class="conn-badge" id="conn-badge">
  <div class="status-dot" id="conn-dot"></div>
  <span id="conn-label">подключение...</span>
</div>

<div class="app" id="main-screen">
  <div class="logo">
    <h1>WAVE</h1>
    <p>peer-to-peer звонки</p>
  </div>

  <div class="card">
    <div class="card-title">твой профиль</div>
    <div class="name-row">
      <input class="name-input" id="name-input" type="text" placeholder="введи своё имя" maxlength="20" />
      <button class="copy-btn" onclick="saveName()">сохранить</button>
    </div>
    <div class="my-id-box">
      <div class="my-id-value" id="my-id">••••••</div>
      <button class="copy-btn" id="copy-btn" onclick="copyId()">скопировать</button>
    </div>
    <div id="server-warning" class="no-signal" style="display:none;">
      <p>⚠️ Не удалось подключиться.<br>Проверь интернет или попробуй ещё раз.</p>
      <button class="copy-btn" style="margin-top:6px" onclick="retryConnect()">🔄 попробовать снова</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">позвонить</div>
    <div class="input-row">
      <input class="id-input" id="call-id-input" type="text" placeholder="введи ID собеседника" maxlength="6" />
    </div>
    <div class="call-btns">
      <button class="btn btn-voice" id="voice-btn" onclick="startCall(false)" disabled>🎙️ Голосовой</button>
      <button class="btn btn-video" id="video-btn" onclick="startCall(true)" disabled>📹 Видео</button>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">ожидание подключения...</span>
    </div>
  </div>
</div>

<div id="call-screen">
  <div id="video-call-ui" style="width:100%;height:100%;position:relative;display:none;">
    <div class="video-container">
      <video id="remote-video" autoplay playsinline></video>
      <video id="local-video" autoplay playsinline muted></video>
    </div>
  </div>
  <div id="voice-call-ui" class="voice-call-ui" style="display:none;">
    <div class="caller-avatar">👤</div>
    <div class="caller-name" id="call-peer-name">—</div>
    <div class="call-timer" id="call-timer-display">00:00</div>
    <div class="sound-wave">
      <div class="wave-bar" style="height:6px"></div><div class="wave-bar" style="height:14px"></div>
      <div class="wave-bar" style="height:20px"></div><div class="wave-bar" style="height:26px"></div>
      <div class="wave-bar" style="height:20px"></div><div class="wave-bar" style="height:14px"></div>
      <div class="wave-bar" style="height:6px"></div>
    </div>
  </div>

  <div id="chat-panel">
    <div class="chat-header">
      <span>чат</span>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chat-input" placeholder="Сообщение..." rows="1"></textarea>
      <button class="chat-send" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div class="call-controls">
    <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()" title="Микрофон">🎙️</button>
    <button class="ctrl-btn" id="cam-btn" onclick="toggleCamera()" title="Камера" style="display:none;">📹</button>
    <button class="ctrl-btn" id="chat-btn" onclick="toggleChat()" title="Чат">
      💬<div class="chat-unread" id="chat-unread">0</div>
    </button>
    <button class="ctrl-btn end" onclick="endCall()">📵</button>
  </div>
</div>

<div id="incoming-screen">
  <div class="incoming-title">входящий звонок</div>
  <div class="caller-avatar" style="margin:0">👤</div>
  <div class="incoming-id" id="incoming-peer-id">——</div>
  <div class="incoming-type" id="incoming-type-label">голосовой звонок</div>
  <div class="incoming-btns">
    <button class="answer-btn answer-decline" onclick="declineCall()">📵</button>
    <button class="answer-btn answer-accept" onclick="acceptCall()">📞</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js';
  s.onload = init;
  s.onerror = () => { setStatus('Ошибка загрузки библиотеки', 'error'); showServerWarning(); };
  document.head.appendChild(s);
})();

let peer = null, currentCall = null, dataConn = null;
let localStream = null;
let isVideo = false, isMuted = false, isCamOff = false, chatOpen = false;
let timerInterval = null, timerSeconds = 0;
let incomingCallObj = null, incomingIsVideo = false;
let myId = null, myName = '';
let unreadCount = 0, ringtoneInterval = null, ringtoneCtx = null;

const ownHost = window.location.hostname;
const ownPort = window.location.port ? parseInt(window.location.port) : (window.location.protocol === 'https:' ? 443 : 80);
const ownSecure = window.location.protocol === 'https:';

const SERVERS = [
  { host: ownHost, port: ownPort, path: '/peerjs', secure: ownSecure },
  { host: '0.peerjs.com', port: 443, path: '/', secure: true },
  { host: 'peerjs.92k.de', port: 443, path: '/', secure: true },
];

const ICE = { iceServers: [
  { urls: 'stun:stun.cloudflare.com:3478' },
  { urls: 'stun:global.stun.twilio.com:3478' },
  { urls: 'stun:stun.yandex.net:3478' },
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
]};

// ── Ringtone ──────────────────────────────────────────────────────────────────
function playRingtone() {
  stopRingtone();
  ringtoneCtx = new (window.AudioContext || window.webkitAudioContext)();
  function beep() {
    const o = ringtoneCtx.createOscillator(), g = ringtoneCtx.createGain();
    o.connect(g); g.connect(ringtoneCtx.destination);
    o.frequency.setValueAtTime(880, ringtoneCtx.currentTime);
    o.frequency.setValueAtTime(660, ringtoneCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ringtoneCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ringtoneCtx.currentTime + 0.45);
    o.start(ringtoneCtx.currentTime); o.stop(ringtoneCtx.currentTime + 0.45);
  }
  beep();
  ringtoneInterval = setInterval(beep, 1200);
  setTimeout(stopRingtone, 30000);
}
function stopRingtone() {
  if (ringtoneInterval) { clearInterval(ringtoneInterval); ringtoneInterval = null; }
  if (ringtoneCtx) { try { ringtoneCtx.close(); } catch(e){} ringtoneCtx = null; }
}

// ── Name ──────────────────────────────────────────────────────────────────────
function saveName() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { toast('Введи имя'); return; }
  myName = val;
  try { localStorage.setItem('wave_name', val); } catch(e){}
  toast('✓ Имя сохранено: ' + val);
}
function loadName() {
  try {
    const saved = localStorage.getItem('wave_name');
    if (saved) { myName = saved; document.getElementById('name-input').value = saved; }
  } catch(e){}
}

// ── Init ──────────────────────────────────────────────────────────────────────
function makeId() { return Math.random().toString(36).substr(2, 6).toUpperCase(); }

function init() {
  loadName();
  myId = makeId();
  document.getElementById('my-id').textContent = myId;
  tryConnect(0);
}

function tryConnect(idx) {
  if (idx >= SERVERS.length) { setStatus('не удалось подключиться', 'error'); showServerWarning(); return; }
  const srv = SERVERS[idx];
  setStatus('подключение ' + (idx+1) + '/' + SERVERS.length + '...', 'calling');
  if (peer) { try { peer.destroy(); } catch(e){} }

  peer = new Peer(myId, { host: srv.host, port: srv.port, path: srv.path, secure: srv.secure, debug: 0, config: ICE });

  const timeout = setTimeout(() => { if (!peer.open) tryConnect(idx + 1); }, 6000);

  peer.on('open', () => {
    clearTimeout(timeout);
    setStatus('готов к звонкам', 'online');
    updateConnBadge(true);
    enableCallButtons();
    document.getElementById('server-warning').style.display = 'none';
  });

  peer.on('disconnected', () => {
    clearTimeout(timeout); updateConnBadge(false); setStatus('переподключение...', 'calling');
    setTimeout(() => {
      if (peer && !peer.destroyed) {
        peer.reconnect();
        setTimeout(() => { if (peer.disconnected) tryConnect(idx + 1); }, 4000);
      }
    }, 1000);
  });

  peer.on('error', (err) => {
    clearTimeout(timeout);
    if (err.type === 'peer-unavailable') { toast('Собеседник недоступен или не в сети'); setStatus('готов к звонкам', 'online'); }
    else if (['network','server-error','socket-error','socket-closed','unavailable-id'].includes(err.type)) tryConnect(idx + 1);
  });

  peer.on('call', (call) => {
    const meta = call.metadata || {};
    incomingCallObj = call; incomingIsVideo = meta.video || false;
    const callerName = meta.name || call.peer;
    document.getElementById('incoming-peer-id').textContent = callerName;
    document.getElementById('incoming-type-label').textContent = incomingIsVideo ? '📹 видеозвонок' : '🎙️ голосовой звонок';
    document.getElementById('incoming-screen').classList.add('active');
    setStatus('звонок от ' + callerName, 'calling');
    playRingtone();
  });

  peer.on('connection', (conn) => {
    conn.on('open', () => setupDataConn(conn));
  });
}

function showServerWarning() { document.getElementById('server-warning').style.display = 'flex'; }
function retryConnect() { document.getElementById('server-warning').style.display = 'none'; tryConnect(0); }
function enableCallButtons() { document.getElementById('voice-btn').disabled = false; document.getElementById('video-btn').disabled = false; }
function updateConnBadge(ok) {
  document.getElementById('conn-dot').className = 'status-dot ' + (ok ? 'online' : 'error');
  document.getElementById('conn-label').textContent = ok ? 'онлайн' : 'офлайн';
}

// ── Data / Chat ───────────────────────────────────────────────────────────────
function setupDataConn(conn) {
  dataConn = conn;
  conn.on('data', (data) => {
    if (data.type === 'chat') {
      addMessage(data.name || conn.peer, data.text, false);
      if (!chatOpen) {
        unreadCount++;
        const badge = document.getElementById('chat-unread');
        badge.textContent = unreadCount; badge.classList.add('show');
      }
    }
  });
  conn.on('close', () => { dataConn = null; });
  conn.on('error', (e) => { console.warn('dataConn error', e); dataConn = null; });
}

function openDataConn(targetId) {
  const conn = peer.connect(targetId, { reliable: true });
  conn.on('open', () => setupDataConn(conn));
  conn.on('error', (e) => console.warn('data conn error', e));
}

// ── Calls ─────────────────────────────────────────────────────────────────────
async function startCall(video) {
  const targetId = document.getElementById('call-id-input').value.trim().toUpperCase();
  if (!targetId) { toast('Введи ID собеседника'); return; }
  if (targetId === peer.id) { toast('Нельзя звонить самому себе 😄'); return; }
  if (!myName) { toast('Сначала введи своё имя!'); return; }

  isVideo = video;
  setStatus('звоним ' + targetId + '...', 'calling');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video ? { width: 1280, height: 720 } : false });
  } catch(e) {
    toast('Нет доступа к ' + (video ? 'камере/микрофону' : 'микрофону'));
    setStatus('готов к звонкам', 'online'); return;
  }

  const call = peer.call(targetId, localStream, { metadata: { video, name: myName } });
  currentCall = call;
  call.on('stream', (s) => {
    showCallScreen(s, video);
    // Open chat data channel only after media stream is up
    openDataConn(targetId);
  });
  call.on('close', () => cleanupCall());
  call.on('error', () => { toast('Ошибка звонка'); cleanupCall(); });
}

async function acceptCall() {
  stopRingtone();
  document.getElementById('incoming-screen').classList.remove('active');
  const call = incomingCallObj;
  isVideo = incomingIsVideo;
  if (!myName) myName = myId;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: incomingIsVideo ? { width: 1280, height: 720 } : false });
  } catch(e) {
    toast('Нет доступа к ' + (incomingIsVideo ? 'камере/микрофону' : 'микрофону'));
    call.close(); return;
  }

  call.answer(localStream);
  currentCall = call;
  call.on('stream', (s) => showCallScreen(s, incomingIsVideo));
  call.on('close', () => cleanupCall());
}

function declineCall() {
  stopRingtone();
  document.getElementById('incoming-screen').classList.remove('active');
  if (incomingCallObj) incomingCallObj.close();
  incomingCallObj = null;
  setStatus('готов к звонкам', 'online');
}

function showCallScreen(remoteStream, video) {
  document.getElementById('call-screen').classList.add('active');
  document.getElementById('main-screen').style.display = 'none';
  const peerName = (currentCall.metadata || {}).name || currentCall.peer;
  document.getElementById('call-peer-name').textContent = peerName;

  if (video) {
    document.getElementById('video-call-ui').style.display = 'block';
    document.getElementById('voice-call-ui').style.display = 'none';
    document.getElementById('cam-btn').style.display = 'flex';
    document.getElementById('remote-video').srcObject = remoteStream;
    document.getElementById('local-video').srcObject = localStream;
  } else {
    document.getElementById('video-call-ui').style.display = 'none';
    document.getElementById('voice-call-ui').style.display = 'flex';
    document.getElementById('cam-btn').style.display = 'none';
    const a = new Audio(); a.srcObject = remoteStream; a.play();
  }
  setStatus('в звонке с ' + peerName, 'online');
  startTimer();
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').classList.toggle('open', chatOpen);
  document.getElementById('chat-btn').classList.toggle('active', chatOpen);
  if (chatOpen) {
    unreadCount = 0;
    document.getElementById('chat-unread').classList.remove('show');
    setTimeout(() => document.getElementById('chat-input').focus(), 300);
  }
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  if (!dataConn || !dataConn.open) { toast('Чат недоступен'); return; }
  dataConn.send({ type: 'chat', name: myName || myId, text });
  addMessage('ты', text, true);
  input.value = ''; input.style.height = 'auto';
}

function addMessage(name, text, mine) {
  const msgs = document.getElementById('chat-messages');
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const div = document.createElement('div');
  div.className = 'msg ' + (mine ? 'mine' : 'theirs');
  div.innerHTML = (!mine ? '<div class="msg-name">' + name + '</div>' : '') +
    '<div>' + text.replace(/</g,'&lt;') + '</div><div class="msg-time">' + time + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Controls ──────────────────────────────────────────────────────────────────
function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🎙️';
  document.getElementById('mute-btn').classList.toggle('active', isMuted);
}
function toggleCamera() {
  if (!localStream) return;
  isCamOff = !isCamOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isCamOff);
  document.getElementById('cam-btn').textContent = isCamOff ? '🚫' : '📹';
  document.getElementById('cam-btn').classList.toggle('active', isCamOff);
}
function endCall() { if (currentCall) currentCall.close(); cleanupCall(); }
function cleanupCall() {
  stopRingtone();
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (dataConn) { try { dataConn.close(); } catch(e){} dataConn = null; }
  currentCall = null; isMuted = false; isCamOff = false; chatOpen = false; unreadCount = 0;
  stopTimer();
  document.getElementById('call-screen').classList.remove('active');
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('chat-unread').classList.remove('show');
  document.getElementById('chat-btn').classList.remove('active');
  document.getElementById('main-screen').style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;';
  document.getElementById('mute-btn').textContent = '🎙️';
  document.getElementById('cam-btn').textContent = '📹';
  setStatus('готов к звонкам', 'online');
  toast('Звонок завершён');
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer() {
  timerSeconds = 0;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
    const s = String(timerSeconds%60).padStart(2,'0');
    document.getElementById('call-timer-display').textContent = m + ':' + s;
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); timerSeconds = 0; document.getElementById('call-timer-display').textContent = '00:00'; }

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(text, type) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').className = 'status-dot ' + (type || '');
}
function copyId() {
  const id = document.getElementById('my-id').textContent;
  if (id === '••••••') return;
  navigator.clipboard.writeText(id).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'скопировано!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'скопировать'; btn.classList.remove('copied'); }, 2000);
  });
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('call-id-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') startCall(false); });
  document.getElementById('name-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });
  document.getElementById('chat-input')?.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  document.getElementById('chat-input')?.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 80) + 'px'; });
});
</script>
